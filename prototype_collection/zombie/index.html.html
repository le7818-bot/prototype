<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D Quarter-view Shooter Prototype</title>
    <!-- Three.js 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; }
        
        /* UI HUD (2D 오버레이) */
        #hud { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 10; }
        .hud-item { margin-bottom: 8px; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; border-left: 4px solid #00a8ff; }
        .hud-item.health { border-left-color: #ff4757; }
        .hud-item.xp { border-left-color: #2ed573; }
        .hud-item.kills { border-left-color: #ffa502; }
        
        #respawnMsg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4757; font-size: 50px; font-weight: bold; display: none; text-shadow: 2px 2px 10px black; pointer-events: none; text-align: center; z-index: 20;}
        
        /* 레벨업 팝업 */
        #levelUpModal {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: #2f3542; padding: 30px; border-radius: 15px; text-align: center; color: white;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.5); width: 400px; border: 2px solid #2ed573;
        }
        .modal-content h2 { margin-top: 0; color: #2ed573; font-size: 32px; text-transform: uppercase; letter-spacing: 2px; }
        .upgrade-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold;
            background: #57606f; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .upgrade-btn:hover:not(:disabled) { background: #747d8c; transform: scale(1.02); }
        .upgrade-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #2f3542; border: 1px solid #57606f; }
        .upgrade-desc { font-size: 12px; color: #a4b0be; }

        /* 피격/빈사 상태 테두리 효과 */
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; box-shadow: none; z-index: 5; transition: box-shadow 0.1s;
        }

        /* 콘솔 UI */
        #consoleBtn { position: absolute; top: 20px; right: 20px; padding: 10px 15px; background: rgba(0,0,0,0.5); color: white; border: 1px solid #555; cursor: pointer; border-radius: 5px; z-index: 30; }
        #consolePanel {
            position: absolute; top: 60px; right: 20px; width: 300px; background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px; border-radius: 8px; display: none; max-height: 80vh; overflow-y: auto; border: 1px solid #444; z-index: 30;
        }
        .form-group { margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px;}
        .form-group input, .form-group select { width: 70px; padding: 2px; }
        .btn-group button { width: 48%; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <!-- 3D 캔버스가 이 자리에 렌더링됩니다 -->
    <div id="game-container"></div>
    <div id="vignette"></div>
    
    <!-- 재장전 플로팅 텍스트 -->
    <div id="reloadFloatingText" style="display: none; position: absolute; color: #f1c40f; font-weight: bold; font-size: 20px; pointer-events: none; text-shadow: 2px 2px 4px black; transform: translate(-50%, -50%); z-index: 15; letter-spacing: 2px;">RELOADING...</div>
    
    <!-- 미니맵 레이더 -->
    <canvas id="minimap" width="150" height="150" style="position: absolute; bottom: 20px; left: 20px; border: 2px solid #555; border-radius: 50%; background: rgba(0,0,0,0.6); z-index: 10; pointer-events: none;"></canvas>

    <div id="hud">
        <div class="hud-item health" id="hpDisplay">HP: 100 / 100</div>
        <div class="hud-item" id="ammoDisplay">AMMO: 30 / 30</div>
        <div class="hud-item xp" id="xpDisplay">LV.0 (XP: 0 / 10)</div>
        <div class="hud-item kills" id="killDisplay">KILLS: 0</div>
    </div>
    
    <div id="respawnMsg">YOU DIED<br><span id="respawnTimer" style="font-size: 30px; color: white;">3.0</span></div>

    <div id="levelUpModal">
        <div class="modal-content">
            <h2>LEVEL UP!</h2>
            <p style="margin-bottom: 20px; color: #dfe4ea;">능력치를 선택하세요 (최대 10레벨)</p>
            <button class="upgrade-btn" id="btnUpgAtk" onclick="applyUpgrade('atk')">
                ⚔️ 공격력 증가 (+2)<br><span class="upgrade-desc" id="descAtk">현재 레벨: 0/10</span>
            </button>
            <button class="upgrade-btn" id="btnUpgMag" onclick="applyUpgrade('mag')">
                🔫 탄창 크기 증가 (+5)<br><span class="upgrade-desc" id="descMag">현재 레벨: 0/10</span>
            </button>
            <button class="upgrade-btn" id="btnUpgHp" onclick="applyUpgrade('hp')">
                ❤️ 최대 체력 증가 (+20 & 회복)<br><span class="upgrade-desc" id="descHp">현재 레벨: 0/10</span>
            </button>
        </div>
    </div>

    <button id="consoleBtn">콘솔 [C]</button>
    <div id="consolePanel">
        <h3 style="margin-top:0; font-size:15px; border-bottom:1px solid #555; padding-bottom:5px;">디버그 메뉴</h3>
        <div class="form-group"><label>무적</label><input type="checkbox" id="c_godMode"></div>
        <button id="btnKillSelf" style="width:100%; padding:5px; background:#ff4757; color:white; border:none; border-radius:3px;">플레이어 사망</button>
        <hr style="border-color:#444;">
        <div class="btn-group" style="display:flex; justify-content:space-between;">
            <button id="btnClearMob">몬스터 클리어</button>
            <button id="btnLvlUp">강제 레벨업</button>
        </div>
    </div>

<script>
window.onload = function () {
    // --- 1. Three.js 기본 설정 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e); // 어두운 밤/사이버펑크 느낌 배경
    scene.fog = new THREE.Fog(0x1a1a2e, 300, 800); // 안개 효과로 깊이감 추가

    // 카메라 (완전한 탑뷰)
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
    // cameraOffset 제거. 완전히 위에서 아래로 직각 고정되게 설정합니다.
    camera.rotation.set(-Math.PI / 2, 0, 0); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // 그림자 활성화
    document.getElementById('game-container').appendChild(renderer.domElement);

    // --- 조명 설정 ---
    const ambientLight = new THREE.AmbientLight(0x404040, 1.5); // 기본 밝기
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(100, 300, 100);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -500;
    dirLight.shadow.camera.right = 500;
    dirLight.shadow.camera.top = 500;
    dirLight.shadow.camera.bottom = -500;
    scene.add(dirLight);

    // --- 공용 재질 및 지오메트리 ---
    const matGround = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const matBuilding = new THREE.MeshLambertMaterial({ color: 0x444455 });
    
    // 좀비 색상 재질
    const matZGreen = new THREE.MeshLambertMaterial({ color: 0x55efc4 });
    const matZPurple = new THREE.MeshLambertMaterial({ color: 0xa29bfe });
    const matZRed = new THREE.MeshLambertMaterial({ color: 0xff7675 });
    
    const geoZombieBase = new THREE.CylinderGeometry(15, 15, 30, 16); // 기존 반지름 15 기준

    // --- 바닥 생성 ---
    const groundGeo = new THREE.PlaneGeometry(3000, 3000);
    const ground = new THREE.Mesh(groundGeo, matGround);
    ground.rotation.x = -Math.PI / 2; // 바닥을 눕힘
    ground.receiveShadow = true;
    scene.add(ground);

    // --- 게임 상태 관리 ---
    const keys = { w: false, a: false, s: false, d: false };
    const mouse = { x: 0, y: 0, isDown: false };
    const raycaster = new THREE.Raycaster();
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // Y=0 평면 (마우스 조준용)

    let isPaused = false;
    let godMode = false;

    // 플레이어 논리 상태
    const playerLogic = {
        radius: 15,
        stats: { baseMaxHp: 100, baseSpeed: 5, baseAttack: 10, baseMagSize: 30, fireRate: 100, reloadTime: 1500, respawnTime: 3000 },
        state: { hp: 100, ammo: 30, isDead: false, isReloading: false, lastFireTime: 0, reloadStartTime: 0, deathTime: 0, invincibilityUntil: 0 },
        progression: { level: 0, xp: 0, kills: 0 },
        upgrades: { atk: 0, mag: 0, hp: 0 }
    };

    let bullets = [];
    let enemyBullets = [];
    let zombies = [];
    let items = []; // 회복 아이템 배열
    let particles = []; // 핏방울 파티클 배열
    
    // 장애물(건물) 세팅 - 무작위로 여러 개의 건물을 배치하되 시작 위치(0,0) 주변은 비움
    const obstaclesData = [];
    for (let i = 0; i < 45; i++) {
        let bx, bz;
        // 플레이어 스폰 위치(0, 0) 기준 반경 400 이내에는 건물이 생성되지 않도록 함 (안전 구역)
        do {
            bx = (Math.random() - 0.5) * 2800; // -1400 ~ 1400 (맵 크기에 맞춰 넓게 분포)
            bz = (Math.random() - 0.5) * 2800;
        } while (Math.sqrt(bx * bx + bz * bz) < 400);

        obstaclesData.push({
            x: bx,
            z: bz,
            w: 100 + Math.random() * 200,  // 폭 100 ~ 300
            d: 100 + Math.random() * 200,  // 깊이 100 ~ 300
            h: 150 + Math.random() * 300   // 높이 150 ~ 450
        });
    }
    
    const obstacleMeshes = [];

    // --- 휴머노이드 캐릭터 생성기 ---
    function createHumanoid(type) {
        const group = new THREE.Group();
        
        let skinColor, clothesColor;
        if(type === 'player') { skinColor = 0xffeaa7; clothesColor = 0x0984e3; }
        else if(type === 'green') { skinColor = 0x55efc4; clothesColor = 0x2d3436; }
        else if(type === 'purple') { skinColor = 0xa29bfe; clothesColor = 0x2d3436; }
        else if(type === 'red') { skinColor = 0xff7675; clothesColor = 0x2d3436; }

        const matSkin = new THREE.MeshLambertMaterial({ color: skinColor });
        const matClothes = new THREE.MeshLambertMaterial({ color: clothesColor });

        // 머리
        const head = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 10), matSkin);
        head.position.set(0, 14, 0);
        head.castShadow = true;
        group.add(head);

        // 몸통
        const body = new THREE.Mesh(new THREE.BoxGeometry(14, 16, 8), matClothes);
        body.position.set(0, 1, 0);
        body.castShadow = true;
        group.add(body);

        // 팔 (앞으로 뻗은 형태)
        const armGeo = new THREE.BoxGeometry(4, 14, 4);
        const lArm = new THREE.Mesh(armGeo, matSkin);
        lArm.position.set(-9, 4, 4);
        lArm.rotation.x = Math.PI / 2; // 앞으로 나란히
        lArm.castShadow = true;
        group.add(lArm);

        const rArm = new THREE.Mesh(armGeo, matSkin);
        rArm.position.set(9, 4, 4);
        rArm.rotation.x = Math.PI / 2;
        rArm.castShadow = true;
        group.add(rArm);

        // 다리
        const legGeo = new THREE.BoxGeometry(5, 14, 5);
        const lLeg = new THREE.Mesh(legGeo, matClothes);
        lLeg.position.set(-4, -14, 0);
        lLeg.castShadow = true;
        group.add(lLeg);

        const rLeg = new THREE.Mesh(legGeo, matClothes);
        rLeg.position.set(4, -14, 0);
        rLeg.castShadow = true;
        group.add(rLeg);

        if(type === 'player') {
            // 총 (오른손에 쥐어줌)
            const gun = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 20), new THREE.MeshLambertMaterial({color: 0x222222}));
            gun.position.set(9, 4, 14);
            gun.castShadow = true;
            group.add(gun);
            
            // 미소녀 핑크 머리 장식
            const hair = new THREE.Mesh(new THREE.BoxGeometry(11, 4, 11), new THREE.MeshLambertMaterial({color: 0xfd79a8}));
            hair.position.set(0, 19, -1);
            group.add(hair);
        }

        group.userData.bodyMesh = body; // 피격 효과용 저장
        group.userData.lArm = lArm; // 애니메이션용 팔 저장
        group.userData.rArm = rArm;
        
        // 크기 스케일 조정 (빨간 좀비는 더 크게, 보라색은 작게)
        if(type === 'red') {
            group.scale.set(1.5, 1.5, 1.5);
        } else if (type === 'purple') {
            group.scale.set(0.9, 0.9, 0.9);
        }

        return group;
    }

    // --- 3D 오브젝트 생성 ---
    
    // 1. 플레이어 생성 (휴머노이드)
    const playerGroup = createHumanoid('player');
    playerGroup.position.set(0, 21, 0); // 다리 길이(14)를 고려하여 위로 띄움
    scene.add(playerGroup);

    // 2. 장애물(건물) 생성
    for (let obs of obstaclesData) {
        const geo = new THREE.BoxGeometry(obs.w, obs.h, obs.d);
        const mesh = new THREE.Mesh(geo, matBuilding);
        // BoxGeometry는 중심점이 가운데이므로 높이의 절반만큼 올려줌
        mesh.position.set(obs.x, obs.h/2, obs.z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        
        // 충돌 판정을 위한 데이터 저장 (2D rect 충돌과 호환되게)
        obstacleMeshes.push({
            x: obs.x - obs.w/2, 
            z: obs.z - obs.d/2, 
            w: obs.w, 
            d: obs.d
        });
    }

    // --- 스폰 관리 시스템 ---
    const spawnSystem = {
        lastSpawnTime: 0,
        greenSpawnCount: 0,
        getInterval: () => Math.max(1000, 3000 - Math.floor(playerLogic.progression.kills / 10) * 200),
        getCount: () => Math.min(10, 1 + Math.floor(playerLogic.progression.kills / 10))
    };

    // --- 헬퍼 함수 ---
    function getPlayerStat(type) {
        if (type === 'maxHp') return playerLogic.stats.baseMaxHp + (playerLogic.upgrades.hp * 20);
        if (type === 'attack') return playerLogic.stats.baseAttack + (playerLogic.upgrades.atk * 2);
        if (type === 'magSize') return playerLogic.stats.baseMagSize + (playerLogic.upgrades.mag * 5);
        return 0;
    }

    function checkLevelUp() {
        const totalUpg = playerLogic.upgrades.atk + playerLogic.upgrades.mag + playerLogic.upgrades.hp;
        if (totalUpg >= 30) return;
        const requiredXp = 10 + (5 * playerLogic.progression.level);
        if (playerLogic.progression.xp >= requiredXp) {
            playerLogic.progression.xp -= requiredXp;
            playerLogic.progression.level++;
            showLevelUpModal();
        }
    }

    function takeDamage(amount) {
        if (godMode || playerLogic.state.isDead || Date.now() < playerLogic.state.invincibilityUntil) return;
        playerLogic.state.hp -= amount;
        playerLogic.state.invincibilityUntil = Date.now() + 500;
        
        // 피격 시 빨간색 깜빡임 시각효과 (몸통)
        playerGroup.userData.bodyMesh.material.color.setHex(0xff0000);
        setTimeout(() => playerGroup.userData.bodyMesh.material.color.setHex(0x0984e3), 100);

        // 핏방울 파티클 생성 (1~2개 가볍게)
        const particleCount = Math.floor(Math.random() * 2) + 1;
        for(let i=0; i<particleCount; i++) {
            const pGeo = new THREE.SphereGeometry(1.5, 4, 4);
            const pMat = new THREE.MeshBasicMaterial({color: 0xff0000});
            const pMesh = new THREE.Mesh(pGeo, pMat);
            pMesh.position.copy(playerGroup.position);
            pMesh.position.y += 10; // 몸통 높이에서 시작
            scene.add(pMesh);
            particles.push({
                mesh: pMesh,
                vx: (Math.random() - 0.5) * 8, // X축 무작위 흩뿌림
                vy: Math.random() * 5 + 5,      // Y축 살짝 튀어오름
                vz: (Math.random() - 0.5) * 8, // Z축 무작위 흩뿌림
                life: 40 // 프레임 수명
            });
        }

        if (playerLogic.state.hp <= 0) die();
    }

    function die() {
        playerLogic.state.isDead = true; 
        playerLogic.state.hp = 0; 
        playerLogic.state.deathTime = Date.now();
        document.getElementById('respawnMsg').style.display = 'block';
        playerGroup.visible = false; // 시체 숨기기
    }

    function respawn() {
        playerLogic.state.isDead = false; 
        playerLogic.state.hp = getPlayerStat('maxHp'); 
        playerLogic.state.ammo = getPlayerStat('magSize');
        playerLogic.state.isReloading = false;
        
        playerGroup.position.set(0, 21, 0); // 원점 부활 (높이 맞춤)
        playerGroup.visible = true;
        
        playerLogic.state.invincibilityUntil = Date.now() + 2000;
        document.getElementById('respawnMsg').style.display = 'none';
        
        // 부활 시 기존 몬스터/총알/아이템/파티클 클리어
        zombies.forEach(z => scene.remove(z.mesh));
        bullets.forEach(b => scene.remove(b.mesh));
        enemyBullets.forEach(b => scene.remove(b.mesh));
        items.forEach(i => scene.remove(i.mesh));
        particles.forEach(p => scene.remove(p.mesh));
        zombies = []; bullets = []; enemyBullets = []; items = []; particles = [];
    }

    // 2D 공간의 AABB 충돌을 XZ 평면에 적용
    function checkRectCollisionXZ(px, pz, radius, rect) {
        let testX = px; let testZ = pz;
        if (px < rect.x) testX = rect.x; else if (px > rect.x + rect.w) testX = rect.x + rect.w;
        if (pz < rect.z) testZ = rect.z; else if (pz > rect.z + rect.d) testZ = rect.z + rect.d;
        let dist = Math.sqrt((px - testX)**2 + (pz - testZ)**2);
        return dist <= radius;
    }

    function spawnZombies() {
        const now = Date.now();
        if (now - spawnSystem.lastSpawnTime > spawnSystem.getInterval()) {
            let count = spawnSystem.getCount();
            
            // 렉 방지: 맵에 존재하는 좀비 수를 최대 30마리로 제한
            if (zombies.length + count > 30) {
                count = 30 - zombies.length;
            }

            for (let i = 0; i < count; i++) {
                spawnSystem.greenSpawnCount++;
                let type = 'green';
                let mat = matZGreen;
                
                if (spawnSystem.greenSpawnCount % 13 === 0) { type = 'red'; mat = matZRed; }
                else if (spawnSystem.greenSpawnCount % 4 === 0) { type = 'purple'; mat = matZPurple; }
                
                // 플레이어 주변 일정 거리 밖에서 원형 스폰
                const angle = Math.random() * Math.PI * 2;
                const dist = 500 + Math.random() * 200; // 500~700 유닛 밖
                const zx = playerGroup.position.x + Math.cos(angle) * dist;
                const zz = playerGroup.position.z + Math.sin(angle) * dist;

                let zBase = { type: type, lastAttack: 0 };
                let radius = 15;
                if (type === 'green') {
                    zBase = { ...zBase, hp: 20, speed: 2, radius: 15, damage: 10 };
                } else if (type === 'purple') {
                    radius = 13;
                    zBase = { ...zBase, hp: 10, speed: 4, radius: 13, damage: 5 };
                } else if (type === 'red') {
                    radius = 20;
                    zBase = { ...zBase, hp: 60, speed: 1, radius: 20, damage: 15, shootInterval: 2000 };
                }

                // 휴머노이드 몬스터 생성
                const mesh = createHumanoid(type);
                mesh.position.set(zx, type === 'red' ? 31 : 21, zz); // 빨간 좀비는 크기가 1.5배이므로 더 띄움
                scene.add(mesh);
                
                zBase.mesh = mesh;
                zombies.push(zBase);
            }
            spawnSystem.lastSpawnTime = now;
        }
    }

    // --- 메인 업데이트 & 렌더 루프 ---
    function animate() {
        requestAnimationFrame(animate);
        
        if (isPaused) {
            renderer.render(scene, camera);
            return;
        }
        
        const now = Date.now();

        // 1. 사망 처리
        if (playerLogic.state.isDead) {
            let remain = (playerLogic.stats.respawnTime - (now - playerLogic.state.deathTime)) / 1000;
            if (remain <= 0) respawn();
            else document.getElementById('respawnTimer').innerText = remain.toFixed(1);
        } else {
            // 2. 플레이어 이동 및 충돌
            let dx = 0, dz = 0;
            if (keys.w) dz -= playerLogic.stats.baseSpeed;
            if (keys.s) dz += playerLogic.stats.baseSpeed;
            if (keys.a) dx -= playerLogic.stats.baseSpeed;
            if (keys.d) dx += playerLogic.stats.baseSpeed;

            if (dx !== 0) {
                playerGroup.position.x += dx;
                let stuck = false;
                for (let obs of obstacleMeshes) if (checkRectCollisionXZ(playerGroup.position.x, playerGroup.position.z, playerLogic.radius, obs)) stuck = true;
                if (stuck) playerGroup.position.x -= dx;
            }
            if (dz !== 0) {
                playerGroup.position.z += dz;
                let stuck = false;
                for (let obs of obstacleMeshes) if (checkRectCollisionXZ(playerGroup.position.x, playerGroup.position.z, playerLogic.radius, obs)) stuck = true;
                if (stuck) playerGroup.position.z -= dz;
            }

            // 무적 깜빡임 (투명도)
            if (Date.now() < playerLogic.state.invincibilityUntil) {
                playerGroup.userData.bodyMesh.material.transparent = true;
                playerGroup.userData.bodyMesh.material.opacity = (Math.floor(Date.now() / 100) % 2 === 0) ? 0.3 : 1;
            } else {
                playerGroup.userData.bodyMesh.material.transparent = false;
                playerGroup.userData.bodyMesh.material.opacity = 1;
            }

            // 3. 마우스 조준 (Raycaster 활용)
            // 화면의 2D 마우스 좌표를 3D 공간의 바닥(Y=0 평면) 위치로 변환
            raycaster.setFromCamera(mouse, camera);
            const intersect = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersect);
            
            if (intersect) {
                // 플레이어가 마우스 교차점(바닥)을 바라보게 함
                playerGroup.lookAt(intersect.x, playerGroup.position.y, intersect.z);
            }

            // 4. 사격 및 장전
            let currentMagSize = getPlayerStat('magSize');
            if (playerLogic.state.isReloading && now - playerLogic.state.reloadStartTime >= playerLogic.stats.reloadTime) {
                playerLogic.state.ammo = currentMagSize; 
                playerLogic.state.isReloading = false;
            }
            
            if (mouse.isDown && !playerLogic.state.isReloading && playerLogic.state.ammo > 0 && (now - playerLogic.state.lastFireTime >= playerLogic.stats.fireRate)) {
                
                // 총구 위치 계산 (로컬 공간에서 앞쪽은 +Z)
                const bulletDir = new THREE.Vector3(0, 0, 1).applyQuaternion(playerGroup.quaternion);
                const bulletPos = playerGroup.position.clone().add(bulletDir.clone().multiplyScalar(25));
                bulletPos.y = 25; // 휴머노이드 총구 높이에 맞춤

                const bGeo = new THREE.SphereGeometry(3, 8, 8);
                const bMat = new THREE.MeshBasicMaterial({ color: 0xf1c40f });
                const bMesh = new THREE.Mesh(bGeo, bMat);
                bMesh.position.copy(bulletPos);
                scene.add(bMesh);

                bullets.push({
                    mesh: bMesh,
                    vx: bulletDir.x * 20,
                    vz: bulletDir.z * 20,
                    life: 100
                });

                playerLogic.state.ammo--; 
                playerLogic.state.lastFireTime = now;
                if (playerLogic.state.ammo === 0) { 
                    playerLogic.state.isReloading = true; 
                    playerLogic.state.reloadStartTime = now; 
                }
            }
        } // end of !isDead block

        spawnZombies();

        // 5. 내 총알 이동 및 충돌
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i]; 
            b.mesh.position.x += b.vx; 
            b.mesh.position.z += b.vz; 
            b.life--;
            
            let destroyed = b.life <= 0;
            
            if (!destroyed) {
                for (let obs of obstacleMeshes) {
                    if (b.mesh.position.x > obs.x && b.mesh.position.x < obs.x + obs.w && 
                        b.mesh.position.z > obs.z && b.mesh.position.z < obs.z + obs.d) { 
                        destroyed = true; break; 
                    }
                }
            }
            if (destroyed) {
                scene.remove(b.mesh);
                bullets.splice(i, 1);
            }
        }

        // 6. 좀비 로직
        for (let j = zombies.length - 1; j >= 0; j--) {
            let z = zombies[j];
            let dx = playerGroup.position.x - z.mesh.position.x;
            let dz = playerGroup.position.z - z.mesh.position.z;
            let distToPlayer = Math.sqrt(dx*dx + dz*dz);
            
            // 좀비 회전 (플레이어 바라보기)
            z.mesh.lookAt(playerGroup.position.x, z.mesh.position.y, playerGroup.position.z);

            if (distToPlayer > z.radius + playerLogic.radius + 2) {
                // 노멀라이즈된 방향 벡터
                let dirX = dx / distToPlayer;
                let dirZ = dz / distToPlayer;
                
                z.mesh.position.x += dirX * z.speed;
                for (let obs of obstacleMeshes) if (checkRectCollisionXZ(z.mesh.position.x, z.mesh.position.z, z.radius, obs)) z.mesh.position.x -= dirX * z.speed;
                z.mesh.position.z += dirZ * z.speed;
                for (let obs of obstacleMeshes) if (checkRectCollisionXZ(z.mesh.position.x, z.mesh.position.z, z.radius, obs)) z.mesh.position.z -= dirZ * z.speed;
                
                // 이동 중 팔 내림 (기본 자세)
                z.mesh.userData.lArm.rotation.x = Math.PI / 2;
                z.mesh.userData.rArm.rotation.x = Math.PI / 2;
            } else if (!playerLogic.state.isDead) {
                // 충돌/공격
                takeDamage(z.damage);
                
                // 공격 시 팔 휘두르기 애니메이션 (위아래로 요동침)
                z.mesh.userData.lArm.rotation.x = Math.PI / 2 + Math.sin(now * 0.02) * 1.5;
                z.mesh.userData.rArm.rotation.x = Math.PI / 2 - Math.sin(now * 0.02) * 1.5;
            }

            // 원거리 적(빨강) 공격
            if (z.type === 'red' && now - z.lastAttack > z.shootInterval && !playerLogic.state.isDead) {
                let dirX = dx / distToPlayer;
                let dirZ = dz / distToPlayer;

                const ebGeo = new THREE.SphereGeometry(5, 8, 8);
                const ebMat = new THREE.MeshBasicMaterial({ color: 0xff4757 });
                const ebMesh = new THREE.Mesh(ebGeo, ebMat);
                ebMesh.position.copy(z.mesh.position);
                ebMesh.position.y = z.type === 'red' ? 35 : 25; // 발사 높이 조절
                scene.add(ebMesh);

                enemyBullets.push({ mesh: ebMesh, vx: dirX * 8, vz: dirZ * 8, life: 150, damage: z.damage });
                z.lastAttack = now;
            }

            // 내 총알과 좀비 피격 판정
            let zDestroyed = false;
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                let bdist = Math.sqrt((b.mesh.position.x - z.mesh.position.x)**2 + (b.mesh.position.z - z.mesh.position.z)**2);
                if (bdist < z.radius) {
                    z.hp -= getPlayerStat('attack');
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                    
                    // 총알에 맞은 좀비 핏방울 파티클 (1방울)
                    const pGeo = new THREE.SphereGeometry(1.5, 4, 4);
                    const pMat = new THREE.MeshBasicMaterial({color: 0xff0000});
                    const pMesh = new THREE.Mesh(pGeo, pMat);
                    pMesh.position.copy(z.mesh.position);
                    pMesh.position.y += 15; // 몸통 높이에서 피가 튐
                    scene.add(pMesh);
                    particles.push({
                        mesh: pMesh,
                        vx: (Math.random() - 0.5) * 4,
                        vy: Math.random() * 3 + 3,
                        vz: (Math.random() - 0.5) * 4,
                        life: 20 // 짧게 유지
                    });
                    
                    if (z.hp <= 0) {
                        scene.remove(z.mesh);
                        zombies.splice(j, 1);
                        zDestroyed = true;
                        
                        // 5% 확률로 체력 회복 아이템(초록색 큐브) 드랍
                        if (Math.random() < 0.05) {
                            const iGeo = new THREE.BoxGeometry(8, 8, 8);
                            const iMat = new THREE.MeshLambertMaterial({color: 0x2ed573, emissive: 0x115522});
                            const iMesh = new THREE.Mesh(iGeo, iMat);
                            iMesh.position.copy(z.mesh.position);
                            iMesh.position.y = 5;
                            scene.add(iMesh);
                            items.push({ mesh: iMesh });
                        }

                        // 경험치 획득
                        if(!playerLogic.state.isDead){
                            playerLogic.progression.kills++; 
                            playerLogic.progression.xp++;
                            checkLevelUp();
                        }
                        break;
                    }
                }
            }
            if (zDestroyed) continue;
        }

        // 7. 적 총알 이동
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            let eb = enemyBullets[i]; 
            eb.mesh.position.x += eb.vx; 
            eb.mesh.position.z += eb.vz; 
            eb.life--;
            
            let destroyed = eb.life <= 0;
            if (!destroyed) {
                for (let obs of obstacleMeshes) {
                    if (eb.mesh.position.x > obs.x && eb.mesh.position.x < obs.x + obs.w && 
                        eb.mesh.position.z > obs.z && eb.mesh.position.z < obs.z + obs.d) { 
                        destroyed = true; break; 
                    }
                }
            }
            
            if (!destroyed && !playerLogic.state.isDead) {
                let pDist = Math.sqrt((eb.mesh.position.x - playerGroup.position.x)**2 + (eb.mesh.position.z - playerGroup.position.z)**2);
                if (pDist < playerLogic.radius) {
                    takeDamage(eb.damage); 
                    destroyed = true;
                }
            }
            if (destroyed) {
                scene.remove(eb.mesh);
                enemyBullets.splice(i, 1);
            }
        }

        // 7-1. 아이템 획득 및 애니메이션
        for(let i = items.length - 1; i >= 0; i--) {
            let item = items[i];
            item.mesh.rotation.y += 0.05; // 빙글빙글 도는 애니메이션
            
            let dist = Math.sqrt((item.mesh.position.x - playerGroup.position.x)**2 + (item.mesh.position.z - playerGroup.position.z)**2);
            if(dist < playerLogic.radius + 10 && !playerLogic.state.isDead) {
                // 체력 30 회복 (최대 체력 초과 불가)
                playerLogic.state.hp = Math.min(getPlayerStat('maxHp'), playerLogic.state.hp + 30);
                scene.remove(item.mesh);
                items.splice(i, 1);
            }
        }

        // 7-2. 핏방울 파티클 애니메이션
        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.mesh.position.x += p.vx;
            p.mesh.position.y += p.vy;
            p.mesh.position.z += p.vz;
            p.vy -= 1; // 중력
            
            if(p.mesh.position.y <= 1) p.mesh.position.y = 1; // 바닥에 떨어지면 멈춤
            
            p.life--;
            if(p.life <= 0) {
                scene.remove(p.mesh);
                particles.splice(i, 1);
            }
        }

        // 8. 카메라 추적 로직 (시점 고정)
        // lookAt을 제거하고 오직 X, Z 좌표만 플레이어를 부드럽게 따라가게 하여 
        // 화면이 빙글빙글 도는 멀미 현상을 완전히 제거했습니다.
        camera.position.x += (playerGroup.position.x - camera.position.x) * 0.1;
        camera.position.z += (playerGroup.position.z - camera.position.z) * 0.1;
        camera.position.y = 500; // 고정 높이

        // 9. 2D HUD 업데이트 및 빈사 상태 테두리 효과
        const currentHp = playerLogic.state.hp;
        const maxHp = getPlayerStat('maxHp');
        
        // 체력 30% 미만일 때 붉은 테두리 심장박동 효과
        if (currentHp / maxHp < 0.3 && !playerLogic.state.isDead) {
            const pulse = (Math.sin(Date.now() / 150) + 1) / 2; // 0 ~ 1 사이 진동
            document.getElementById('vignette').style.boxShadow = `inset 0 0 ${100 + pulse * 100}px rgba(255, 0, 0, ${0.3 + pulse * 0.4})`;
        } else {
            document.getElementById('vignette').style.boxShadow = 'none';
        }

        document.getElementById('hpDisplay').innerText = `HP: ${currentHp} / ${maxHp}`;
        document.getElementById('ammoDisplay').innerText = playerLogic.state.isReloading ? "RELOADING..." : `AMMO: ${playerLogic.state.ammo} / ${getPlayerStat('magSize')}`;
        document.getElementById('killDisplay').innerText = `KILLS: ${playerLogic.progression.kills}`;
        
        if (playerLogic.upgrades.atk + playerLogic.upgrades.mag + playerLogic.upgrades.hp >= 30) {
            document.getElementById('xpDisplay').innerText = `LV.MAX (ALL UPGRADES MAXED)`;
        } else {
            document.getElementById('xpDisplay').innerText = `LV.${playerLogic.progression.level} (XP: ${playerLogic.progression.xp} / ${10 + (5 * playerLogic.progression.level)})`;
        }

        // 10. 재장전 플로팅 텍스트 업데이트
        const reloadUI = document.getElementById('reloadFloatingText');
        if (playerLogic.state.isReloading && !playerLogic.state.isDead) {
            reloadUI.style.display = 'block';
            // 3D 좌표를 2D 화면 좌표로 변환
            const tempV = playerGroup.position.clone();
            tempV.y += 35; // 캐릭터 머리 위
            tempV.project(camera);
            const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
            const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
            reloadUI.style.left = `${x}px`;
            reloadUI.style.top = `${y}px`;
        } else {
            reloadUI.style.display = 'none';
        }

        // 11. 미니맵 렌더링
        const miniCtx = document.getElementById('minimap').getContext('2d');
        miniCtx.clearRect(0, 0, 150, 150);
        if (!playerLogic.state.isDead) {
            const cx = 75, cy = 75;
            const scale = 150 / 2000; // 반경 1000 유닛 범위를 표시

            // 건물 표시
            miniCtx.fillStyle = 'rgba(100, 100, 100, 0.8)';
            for (let obs of obstaclesData) {
                let mx = cx + (obs.x - playerGroup.position.x) * scale;
                let my = cy + (obs.z - playerGroup.position.z) * scale;
                let mw = obs.w * scale;
                let mh = obs.d * scale;
                miniCtx.fillRect(mx - mw/2, my - mh/2, mw, mh);
            }

            // 회복 아이템 표시
            miniCtx.fillStyle = '#2ed573';
            for (let item of items) {
                let mx = cx + (item.mesh.position.x - playerGroup.position.x) * scale;
                let my = cy + (item.mesh.position.z - playerGroup.position.z) * scale;
                miniCtx.fillRect(mx - 2, my - 2, 4, 4);
            }

            // 좀비 표시
            for (let z of zombies) {
                let mx = cx + (z.mesh.position.x - playerGroup.position.x) * scale;
                let my = cy + (z.mesh.position.z - playerGroup.position.z) * scale;
                miniCtx.fillStyle = z.type === 'red' ? '#ff7675' : (z.type === 'purple' ? '#a29bfe' : '#55efc4');
                miniCtx.beginPath();
                miniCtx.arc(mx, my, 2.5, 0, Math.PI * 2);
                miniCtx.fill();
            }

            // 플레이어 표시
            miniCtx.fillStyle = '#0984e3';
            miniCtx.beginPath();
            miniCtx.arc(cx, cy, 3, 0, Math.PI * 2);
            miniCtx.fill();
            
            // 플레이어 시야 방향 표시 (레이더 선)
            miniCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            miniCtx.lineWidth = 1.5;
            miniCtx.beginPath();
            miniCtx.moveTo(cx, cy);
            const bulletDir = new THREE.Vector3(0, 0, 1).applyQuaternion(playerGroup.quaternion);
            miniCtx.lineTo(cx + bulletDir.x * 12, cy + bulletDir.z * 12);
            miniCtx.stroke();
        }

        renderer.render(scene, camera);
    } // end animate()

    // --- 레벨업 시스템 UI 상호작용 ---
    function showLevelUpModal() {
        isPaused = true;
        document.getElementById('levelUpModal').style.display = 'flex';
        keys.w = keys.a = keys.s = keys.d = false;

        ['Atk', 'Mag', 'Hp'].forEach(type => {
            let key = type.toLowerCase();
            let btn = document.getElementById(`btnUpg${type}`);
            document.getElementById(`desc${type}`).innerText = `현재 레벨: ${playerLogic.upgrades[key]}/10`;
            btn.disabled = playerLogic.upgrades[key] >= 10;
        });
    }

    window.applyUpgrade = function(type) {
        if (playerLogic.upgrades[type] < 10) {
            playerLogic.upgrades[type]++;
            if (type === 'hp') playerLogic.state.hp += 20;
            else if (type === 'mag') playerLogic.state.ammo += 5;
            document.getElementById('levelUpModal').style.display = 'none';
            isPaused = false;
            checkLevelUp();
        }
    };

    // --- 키보드 및 마우스 입력 ---
    window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (e.code === 'KeyW' || e.code === 'ArrowUp' || k === 'w' || k === 'ㅈ') keys.w = true;
        if (e.code === 'KeyS' || e.code === 'ArrowDown' || k === 's' || k === 'ㄴ') keys.s = true;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft' || k === 'a' || k === 'ㅁ') keys.a = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight' || k === 'd' || k === 'ㅇ') keys.d = true;

        if ((e.code === 'KeyR' || k === 'r' || k === 'ㄱ') && !playerLogic.state.isReloading && !playerLogic.state.isDead && playerLogic.state.ammo < getPlayerStat('magSize')) {
            playerLogic.state.isReloading = true; playerLogic.state.reloadStartTime = Date.now();
        }
        if (e.code === 'KeyC' || k === 'c' || k === 'ㅊ') {
            const panel = document.getElementById('consolePanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
    });

    window.addEventListener('keyup', (e) => {
        const k = e.key.toLowerCase();
        if (e.code === 'KeyW' || e.code === 'ArrowUp' || k === 'w' || k === 'ㅈ') keys.w = false;
        if (e.code === 'KeyS' || e.code === 'ArrowDown' || k === 's' || k === 'ㄴ') keys.s = false;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft' || k === 'a' || k === 'ㅁ') keys.a = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight' || k === 'd' || k === 'ㅇ') keys.d = false;
    });

    window.addEventListener('blur', () => {
        keys.w = keys.a = keys.s = keys.d = false;
        mouse.isDown = false;
    });

    // 2D 마우스 좌표를 Three.js에 맞게 정규화 (-1 ~ +1)
    window.addEventListener('mousemove', (e) => { 
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });
    window.addEventListener('mousedown', (e) => { if(e.button === 0) mouse.isDown = true; });
    window.addEventListener('mouseup', (e) => { if(e.button === 0) mouse.isDown = false; });
    
    window.addEventListener('resize', () => { 
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight); 
    });

    document.getElementById('consoleBtn').onclick = () => {
        const panel = document.getElementById('consolePanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    };
    document.getElementById('btnKillSelf').onclick = () => { if(!playerLogic.state.isDead) die(); };
    document.getElementById('btnClearMob').onclick = () => { 
        zombies.forEach(z => scene.remove(z.mesh)); zombies = []; 
        enemyBullets.forEach(b => scene.remove(b.mesh)); enemyBullets = []; 
    };
    document.getElementById('btnLvlUp').onclick = () => { 
        if(!isPaused) { playerLogic.progression.xp = 10 + (5 * playerLogic.progression.level); checkLevelUp(); }
    };
    document.getElementById('c_godMode').onchange = (e) => { godMode = e.target.checked; };

    // 루프 시작
    animate();
}; // window.onload
</script>
</body>
</html>
