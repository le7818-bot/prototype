<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Quarter-view Shooter Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; touch-action: none; }
        
        /* UI HUD */
        #hud { position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); z-index: 10; display: flex; flex-direction: column; gap: 5px; }
        .hud-item { font-size: 14px; font-weight: 600; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); padding: 6px 10px; border-radius: 6px; border-left: 4px solid #00a8ff; letter-spacing: 0.5px; }
        .hud-item.health { border-left-color: #ff4757; }
        .hud-item.xp { border-left-color: #2ed573; }
        .hud-item.kills { border-left-color: #ffa502; }
        .hud-item.stage { border-left-color: #f1c40f; }
        
        #respawnMsg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4757; font-size: 50px; font-weight: bold; display: none; text-shadow: 2px 2px 10px black; pointer-events: none; text-align: center; z-index: 20;}
        #pauseMsg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 60px; font-weight: bold; display: none; text-shadow: 2px 2px 10px black; pointer-events: none; text-align: center; z-index: 20; letter-spacing: 5px;}
        
        #levelUpModal, #stageClearModal {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: #2f3542; padding: 25px; border-radius: 15px; text-align: center; color: white;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.5); width: 450px; max-width: 90vw; border: 2px solid #2ed573; max-height: 90vh; overflow-y: auto;
        }
        .modal-content.stage-clear { box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); border-color: #f1c40f; }
        .modal-content h2 { margin-top: 0; color: #2ed573; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        .modal-content.stage-clear h2 { color: #f1c40f; }
        
        .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upgrade-btn {
            display: block; width: 100%; padding: 12px; font-size: 13px; font-weight: bold;
            background: #57606f; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .upgrade-btn:hover:not(:disabled) { background: #747d8c; transform: scale(1.02); }
        .upgrade-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #2f3542; border: 1px solid #57606f; }
        .upgrade-desc { font-size: 11px; color: #a4b0be; display: block; margin-top: 5px; }

        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;
            box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.6); opacity: 0; transition: opacity 0.3s ease-in-out;
        }
        @keyframes heartbeatAnim { 0% { opacity: 0.2; } 50% { opacity: 0.8; } 100% { opacity: 0.2; } }
        #vignette.active { animation: heartbeatAnim 0.8s infinite ease-in-out; }

        @keyframes escapePulse { 0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } }
        #escapeTopMsg { position: absolute; top: 12%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: bold; color: #f1c40f; text-shadow: 0 0 10px #f1c40f, 2px 2px 5px black; z-index: 20; letter-spacing: 5px; animation: escapePulse 0.8s infinite alternate; display: none; pointer-events: none; }
        #escapePointer { display: none; position: absolute; font-weight: bold; color: #f1c40f; font-size: 24px; z-index: 15; text-shadow: 0 0 5px black, 2px 2px 5px black; pointer-events: none; white-space: nowrap; transform: translate(-50%, -50%); align-items: center; gap: 8px; }

        #topRightControls { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; gap: 8px; }
        .top-btn { padding: 6px 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); color: white; border: 1px solid #555; cursor: pointer; border-radius: 5px; font-weight: 600; font-size: 13px; transition: 0.2s; white-space: nowrap; }
        .top-btn:hover { background: rgba(50,50,50,0.8); }
        .top-btn.active { background: rgba(46, 213, 115, 0.4); border-color: #2ed573; }
        .action-btn { background: #f1c40f; color: black; font-size: 16px; padding: 12px; width: 100%; margin-top: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .action-btn:hover { background: #ffeaa7; }

        #consolePanel {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 280px; background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px; border-radius: 8px; display: none; max-height: 80vh; overflow-y: auto; border: 1px solid #444; z-index: 30;
        }
        .form-group { margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px;}
        .form-group input { width: 60px; padding: 2px; }
        .btn-group button { width: 48%; padding: 5px; cursor: pointer; font-size: 12px; }

        #skillsUI { position: absolute; bottom: 180px; right: 20px; display: flex; gap: 15px; z-index: 30; pointer-events: auto; }
        .skill-icon {
            width: 60px; height: 60px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); border: 2px solid #555; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer;
        }
        .skill-icon.ready { border-color: #00a8ff; box-shadow: 0 0 10px rgba(0, 168, 255, 0.5); }
        .skill-icon.grenade-ready { border-color: #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }
        .skill-key { color: white; font-weight: bold; font-size: 10px; z-index: 2; margin-bottom: 2px;}
        .skill-name { color: #00a8ff; font-weight: 800; font-size: 14px; z-index: 2; }
        .skill-name.grenade { color: #ff4757; }
        .skill-count { color: white; font-size: 11px; font-weight: bold; z-index: 2; margin-top: 1px; }
        .skill-cooldown { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(255, 71, 87, 0.5); z-index: 1; transition: height 0.1s linear; }

        .touch-zone { position: absolute; top: 0; height: 100vh; width: 50vw; z-index: 8; touch-action: none; }
        #leftZone { left: 0; }
        #rightZone { right: 0; }
        .joystick-base { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); transform: translate(-50%, -50%); display: none; z-index: 9; pointer-events: none; }
        .joystick-knob { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.6); transform: translate(-50%, -50%); display: none; z-index: 9; pointer-events: none; }

        @media (max-width: 768px) {
            #topRightControls { top: 10px; width: 95%; justify-content: center; flex-wrap: wrap; gap: 5px; }
            .top-btn { padding: 4px 8px; font-size: 11px; }
            #hud { top: 60px; left: 10px; transform: scale(0.9); transform-origin: left top; }
            .upgrade-grid { grid-template-columns: 1fr; }
            #skillsUI { bottom: 150px; right: 10px; gap: 10px; }
            .skill-icon { width: 52px; height: 52px; }
            .skill-name { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="vignette"></div>
    
    <div id="leftZone" class="touch-zone"></div>
    <div id="rightZone" class="touch-zone"></div>
    <div id="joyBaseL" class="joystick-base"></div><div id="joyKnobL" class="joystick-knob"></div>
    <div id="joyBaseR" class="joystick-base"></div><div id="joyKnobR" class="joystick-knob"></div>

    <div id="itemLabelsContainer" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 12;"></div>
    <div id="reloadFloatingText" style="display: none; position: absolute; color: #f1c40f; font-weight: bold; font-size: 18px; pointer-events: none; text-shadow: 2px 2px 4px black; transform: translate(-50%, -50%); z-index: 15; letter-spacing: 1px;">RELOADING...</div>
    
    <canvas id="minimap" width="130" height="130" style="position: absolute; top: 15px; right: 15px; border: 2px solid #555; border-radius: 50%; background: rgba(0,0,0,0.6); z-index: 10; pointer-events: none;"></canvas>

    <div id="skillsUI">
        <div id="rollUI" class="skill-icon ready">
            <span class="skill-key">SHIFT</span>
            <span class="skill-name">ROLL</span>
            <div id="rollCooldownOverlay" class="skill-cooldown" style="height: 0%;"></div>
        </div>
        <div id="grenadeUI" class="skill-icon grenade-ready">
            <span class="skill-key">SPACE</span>
            <span class="skill-name grenade">BOMB</span>
            <span class="skill-count">x<span id="grenadeCount">2</span></span>
        </div>
    </div>

    <div id="hud">
        <div class="hud-item stage" id="stageDisplay">STAGE: 1</div>
        <div class="hud-item health" id="hpDisplay">HP: 100 / 100</div>
        <div class="hud-item" id="ammoDisplay">[G17] AMMO: 17 / ∞</div>
        <div class="hud-item xp" id="xpDisplay">LV.0 (XP: 0 / 5)</div>
        <div class="hud-item kills" id="killDisplay">KILLS: 0 / 100</div>
    </div>
    
    <div id="respawnMsg">YOU DIED<br><span id="respawnTimer" style="font-size: 30px; color: white;">3.0</span></div>
    <div id="pauseMsg">PAUSED</div>

    <div id="escapeTopMsg">ESCAPE AVAILABLE</div>
    <div id="escapePointer">
        <span id="escapePointerText">ESCAPE</span>
        <span id="escapePointerArrow" style="display:inline-block; font-size: 26px;">➔</span>
    </div>

    <div id="levelUpModal">
        <div class="modal-content">
            <h2>LEVEL UP!</h2>
            <p style="margin-bottom: 15px; color: #dfe4ea; font-size: 13px;">능력치를 선택하세요 (각 최대 10레벨)</p>
            <div class="upgrade-grid">
                <button class="upgrade-btn" id="btnUpgAtkGlock" onclick="applyUpgrade('atkGlock')">🔫 G17 대미지 +10%<span class="upgrade-desc" id="descAtkGlock"></span></button>
                <button class="upgrade-btn" id="btnUpgAtkUzi" onclick="applyUpgrade('atkUzi')">💨 UZI 대미지 +10%<span class="upgrade-desc" id="descAtkUzi"></span></button>
                <button class="upgrade-btn" id="btnUpgAtkAk" onclick="applyUpgrade('atkAk')">💥 AK47 대미지 +10%<span class="upgrade-desc" id="descAtkAk"></span></button>
                <button class="upgrade-btn" id="btnUpgAtkSpas" onclick="applyUpgrade('atkSpas')">🔥 SP15 대미지 +10%<span class="upgrade-desc" id="descAtkSpas"></span></button>
                <button class="upgrade-btn" id="btnUpgAtkGrenade" onclick="applyUpgrade('atkGrenade')">💣 수류탄 대미지 +10%<span class="upgrade-desc" id="descAtkGrenade"></span></button>
                <button class="upgrade-btn" id="btnUpgRangeGrenade" onclick="applyUpgrade('rangeGrenade')">💥 수류탄 폭발범위 +10%<span class="upgrade-desc" id="descRangeGrenade"></span></button>
                <button class="upgrade-btn" id="btnUpgReload" onclick="applyUpgrade('reload')">⚡ 재장전 속도 +10%<span class="upgrade-desc" id="descReload"></span></button>
                <button class="upgrade-btn" id="btnUpgHp" onclick="applyUpgrade('hp')">❤️ 최대 체력 증가 (+20)<span class="upgrade-desc" id="descHp"></span></button>
            </div>
        </div>
    </div>

    <div id="stageClearModal">
        <div class="modal-content stage-clear">
            <h2>STAGE CLEAR!</h2>
            <p style="margin-bottom: 20px; color: #dfe4ea; font-size: 15px;">헬리콥터로 무사히 탈출했습니다.<br>적들이 점점 더 강해집니다!</p>
            <button class="action-btn" onclick="nextStage()">다음 스테이지 진행</button>
        </div>
    </div>

    <div id="topRightControls">
        <button id="autoBtn" class="top-btn">오토: OFF [T]</button>
        <button id="pauseBtn" class="top-btn">일시정지 [P]</button>
        <button id="consoleBtn" class="top-btn">콘솔 [C]</button>
    </div>

    <div id="consolePanel">
        <h3 style="margin-top:0; font-size:14px; border-bottom:1px solid #555; padding-bottom:5px;">디버그 메뉴</h3>
        <div class="form-group"><label>무적</label><input type="checkbox" id="c_godMode"></div>
        <button id="btnKillSelf" style="width:100%; padding:5px; background:#ff4757; color:white; border:none; border-radius:3px;">플레이어 사망</button>
        <hr style="border-color:#444;">
        <div class="btn-group" style="display:flex; justify-content:space-between;">
            <button id="btnClearMob">몬스터 클리어</button>
            <button id="btnLvlUp">강제 레벨업</button>
        </div>
    </div>

<script>
window.onload = function () {
    // --- 설정 및 상태 변수 ---
    const WEAPONS = {
        glock:   { name: 'G17',  damage: 15, fireRate: 300, magSize: 17, reloadTime: 1200, range: 800, upgKey: 'atkGlock', shake: 2 },
        uzi:     { name: 'UZI',  damage: 8,  fireRate: 80,  magSize: 50, reloadTime: 1500, range: 600, upgKey: 'atkUzi', shake: 1.5 },
        ak47:    { name: 'AK47', damage: 22, fireRate: 150, magSize: 30, reloadTime: 1800, range: 1000, upgKey: 'atkAk', shake: 4 },
        spas15:  { name: 'SP15', damage: 22, fireRate: 600, magSize: 6,  reloadTime: 2000, pellets: 5, spread: 0.25, range: 400, upgKey: 'atkSpas', shake: 8 }
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e); 
    scene.fog = new THREE.Fog(0x1a1a2e, 300, 1000); 

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
    camera.rotation.set(-Math.PI / 2, 0, 0); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; 
    document.getElementById('game-container').appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x707080, 1.5); 
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(100, 300, 100);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -500; dirLight.shadow.camera.right = 500;
    dirLight.shadow.camera.top = 500; dirLight.shadow.camera.bottom = -500;
    scene.add(dirLight);

    const matGround = new THREE.MeshLambertMaterial({ color: 0x3d3d4e });
    const matBuilding = new THREE.MeshLambertMaterial({ color: 0x636e72 });

    const groundGeo = new THREE.PlaneGeometry(3000, 3000);
    const ground = new THREE.Mesh(groundGeo, matGround);
    ground.rotation.x = -Math.PI / 2; 
    ground.receiveShadow = true;
    scene.add(ground);

    const keys = { w: false, a: false, s: false, d: false };
    const mouse = { x: 0, y: 0, isDown: false };
    const raycaster = new THREE.Raycaster();
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); 

    let isGamePaused = false;
    let isLevelingUp = false;
    let isAutoMode = false;
    let godMode = false;

    // 게임 필(Game Feel) 변수
    let cameraShake = 0;
    let hitStopTime = 0;
    let lastTime = performance.now();

    const maxJoyDist = 50;
    const joysticks = {
        left: { active: false, id: null, origin: {x:0,y:0}, dir: {x:0, y:0}, baseEl: document.getElementById('joyBaseL'), knobEl: document.getElementById('joyKnobL') },
        right: { active: false, id: null, origin: {x:0,y:0}, dir: {x:0, y:0}, baseEl: document.getElementById('joyBaseR'), knobEl: document.getElementById('joyKnobR') }
    };

    let stage = 1;
    let escapePoint = null;
    let escapeData = { active: false, phase: 0, heli: null };

    const playerLogic = {
        radius: 20,
        weapon: 'glock',
        stats: { baseMaxHp: 100, baseSpeed: 300, respawnTime: 3000 }, // speed 5 -> 300 (프레임 보정)
        state: { hp: 100, ammo: 17, totalAmmo: Infinity, grenades: 2, isDead: false, isReloading: false, lastFireTime: 0, reloadStartTime: 0, deathTime: 0, invincibilityUntil: 0,
                 isRolling: false, lastRollTime: 0, rollCooldown: 3000, rollDuration: 300, rollDir: new THREE.Vector3() },
        progression: { level: 0, xp: 0, kills: 0 },
        upgrades: { atkGlock: 0, atkUzi: 0, atkAk: 0, atkSpas: 0, atkGrenade: 0, rangeGrenade: 0, reload: 0, hp: 0 }
    };

    // --- 오브젝트 풀링 (Object Pooling) 구조 구현 ---
    class ObjectPool {
        constructor(createFn) {
            this.pool = [];
            this.createFn = createFn;
        }
        get() {
            let obj = this.pool.find(o => !o.active);
            if (!obj) {
                obj = this.createFn();
                this.pool.push(obj);
            }
            obj.active = true;
            obj.mesh.visible = true;
            return obj;
        }
        release(obj) {
            obj.active = false;
            obj.mesh.visible = false;
        }
        releaseAll() {
            this.pool.forEach(obj => this.release(obj));
        }
    }

    const bulletPool = new ObjectPool(() => {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(2.5, 8, 8), new THREE.MeshBasicMaterial({ color: 0xf1c40f }));
        scene.add(mesh);
        return { mesh, active: false, vx: 0, vz: 0, life: 0 };
    });

    const enemyBulletPool = new ObjectPool(() => {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(6, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff4757 }));
        scene.add(mesh);
        return { mesh, active: false, vx: 0, vz: 0, life: 0, damage: 0 };
    });

    const particlePool = new ObjectPool(() => {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(2, 4, 4), new THREE.MeshBasicMaterial({color: 0xff0000}));
        scene.add(mesh);
        return { mesh, active: false, vx: 0, vy: 0, vz: 0, life: 0 };
    });

    let activeBullets = [];
    let activeEnemyBullets = [];
    let activeParticles = [];
    let zombies = [];
    let items = []; 
    let thrownGrenades = [];
    let explosions = [];
    let obstaclesData = [];
    let obstacleMeshes = [];

    // --- 맵 생성 ---
    function generateMap() {
        obstaclesData = [];
        obstacleMeshes.forEach(om => scene.remove(om.mesh));
        obstacleMeshes = [];

        for (let i = 0; i < 45; i++) {
            let bx, bz, bw, bd, bh;
            let isValid = false;
            let attempts = 0;
            
            while (!isValid && attempts < 50) {
                bx = (Math.random() - 0.5) * 2800;
                bz = (Math.random() - 0.5) * 2800;
                bw = 100 + Math.random() * 200;
                bd = 100 + Math.random() * 200;
                bh = 150 + Math.random() * 300;
                
                if (Math.sqrt(bx * bx + bz * bz) < 400) { attempts++; continue; }

                let overlap = false;
                for (let obs of obstaclesData) {
                    let minXDist = (bw + obs.w) / 2 + 60;
                    let minZDist = (bd + obs.d) / 2 + 60;
                    if (Math.abs(bx - obs.x) < minXDist && Math.abs(bz - obs.z) < minZDist) { overlap = true; break; }
                }
                if (!overlap) isValid = true;
                attempts++;
            }
            if (isValid) obstaclesData.push({x: bx, z: bz, w: bw, d: bd, h: bh});
        }

        for (let obs of obstaclesData) {
            const geo = new THREE.BoxGeometry(obs.w, obs.h, obs.d);
            const mesh = new THREE.Mesh(geo, matBuilding);
            mesh.position.set(obs.x, obs.h/2, obs.z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            obstacleMeshes.push({ mesh: mesh, x: obs.x - obs.w/2, z: obs.z - obs.d/2, w: obs.w, d: obs.d });
        }
    }
    generateMap(); 

    const addOutline = (mesh) => {
        const edges = new THREE.EdgesGeometry(mesh.geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 }));
        mesh.add(line);
    };

    function createWeaponModel(type) {
        const group = new THREE.Group();
        const matDark = new THREE.MeshLambertMaterial({ color: 0x1e272e }); 
        const matWood = new THREE.MeshLambertMaterial({ color: 0xe67e22 }); 
        const matGrey = new THREE.MeshLambertMaterial({ color: 0xb2bec3 }); 

        if (type === 'glock') {
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 10), matDark); barrel.position.set(0, 2, 3); addOutline(barrel);
            const grip = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 4), matGrey); grip.position.set(0, -2.5, -2); addOutline(grip);
            group.add(barrel, grip);
        } else if (type === 'uzi') {
            const body = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 12), matDark); addOutline(body);
            const grip = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 4), matGrey); grip.position.set(0, -5, -2); addOutline(grip);
            const mag = new THREE.Mesh(new THREE.BoxGeometry(3, 6, 4), matDark); mag.position.set(0, -5.5, 2); addOutline(mag);
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 6), matGrey); barrel.position.set(0, 0.5, 9); addOutline(barrel);
            group.add(body, grip, mag, barrel);
        } else if (type === 'ak47') {
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 16), matDark); addOutline(body);
            const grip = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 4), matWood); grip.position.set(0, -5, -4); addOutline(grip);
            const stock = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 10), matWood); stock.position.set(0, -2.5, -13); addOutline(stock);
            const mag = new THREE.Mesh(new THREE.BoxGeometry(3, 7, 5), matDark); mag.position.set(0, -6, 4); mag.rotation.x = Math.PI / 8; addOutline(mag);

    function getPlayerStat(type) {
        const w = WEAPONS[playerLogic.weapon];
        if (type === 'maxHp') return playerLogic.stats.baseMaxHp + (playerLogic.upgrades.hp * 20);
        if (type === 'attack') return w.damage * (1 + playerLogic.upgrades[w.upgKey] * 0.1); 
        if (type === 'magSize') return w.magSize;
        if (type === 'fireRate') return w.fireRate;
        if (type === 'reloadTime') return w.reloadTime * (1 - Math.min(0.8, playerLogic.upgrades.reload * 0.1));
        return 0;
    }

    function checkRectCollisionXZ(px, pz, radius, rect) {
        let testX = px; let testZ = pz;
        if (px < rect.x) testX = rect.x; else if (px > rect.x + rect.w) testX = rect.x + rect.w;
        if (pz < rect.z) testZ = rect.z; else if (pz > rect.z + rect.d) testZ = rect.z + rect.d;
        return Math.sqrt((px - testX)**2 + (pz - testZ)**2) <= radius;
    }

    function spawnZombies() {
        const now = Date.now();
        if (now - spawnSystem.lastSpawnTime > spawnSystem.getInterval()) {
            let count = spawnSystem.getCount();
            if (zombies.length + count > 30) count = Math.max(0, 30 - zombies.length);

            for (let i = 0; i < count; i++) {
                spawnSystem.greenSpawnCount++;
                let type = 'green';
                if (spawnSystem.greenSpawnCount % 30 === 0) type = 'blue'; 
                else if (spawnSystem.greenSpawnCount % 13 === 0) type = 'red'; 
                else if (spawnSystem.greenSpawnCount % 4 === 0) type = 'purple'; 
                
                let zBase = { type: type, lastAttack: 0 };
                const dmgMod = 1 + (stage - 1) * 0.1;
                // 속도를 프레임 독립을 위해 초당 이동 픽셀로 변환
                if (type === 'green') zBase = { ...zBase, hp: 20, speed: 150, radius: 20, damage: 10 * dmgMod };
                else if (type === 'purple') zBase = { ...zBase, hp: 10, speed: 300, radius: 17, damage: 5 * dmgMod };
                else if (type === 'red') zBase = { ...zBase, hp: 80, speed: 72, radius: 26, damage: 10 * dmgMod, shootInterval: 2000 };
                else if (type === 'blue') zBase = { ...zBase, hp: 300, speed: 48, radius: 35, damage: 15 * dmgMod, shootInterval: 3000 };

                let spawnValid = false; let attempts = 0; let zx, zz;
                while (!spawnValid && attempts < 15) {
                    const angle = Math.random() * Math.PI * 2; const dist = 500 + Math.random() * 200; 
                    zx = playerGroup.position.x + Math.cos(angle) * dist; zz = playerGroup.position.z + Math.sin(angle) * dist;
                    spawnValid = true;
                    if (Math.abs(zx) > 1500 - zBase.radius || Math.abs(zz) > 1500 - zBase.radius) { spawnValid = false; attempts++; continue; }
                    for (let obs of obstacleMeshes) {
                        if (checkRectCollisionXZ(zx, zz, zBase.radius + 10, obs)) { spawnValid = false; break; }
                    }
                    attempts++;
                }

                if (!spawnValid) continue;
                const mesh = createHumanoid(type);
                if (type === 'blue') mesh.position.set(zx, 54.6, zz);
                else if (type === 'red') mesh.position.set(zx, 40.95, zz);
                else if (type === 'purple') mesh.position.set(zx, 24.57, zz);
                else mesh.position.set(zx, 27.3, zz);
                
                scene.add(mesh); zBase.mesh = mesh; zombies.push(zBase);
            }
            spawnSystem.lastSpawnTime = now;
        }
    }

    function spawnEscapePoint() {

            ex = (Math.random() - 0.5) * 2000; ez = (Math.random() - 0.5) * 2000;
            if (Math.sqrt((ex - playerGroup.position.x)**2 + (ez - playerGroup.position.z)**2) < 500) { attempts++; continue; }
            valid = true;
            for(let obs of obstacleMeshes) {

            }
            attempts++;
        }
        if(valid) {
            const mesh = new THREE.Mesh(new THREE.CylinderGeometry(30, 30, 5, 32), new THREE.MeshBasicMaterial({color: 0xf1c40f, transparent:true, opacity:0.8}));

    // --- 프레임 갱신 (모듈화) ---
    function updatePlayerMovement(dt) {
        let dx = 0, dz = 0;
        let isMoving = false;

        if (playerLogic.state.isRolling) {
            if (Date.now() - playerLogic.state.lastRollTime > playerLogic.state.rollDuration) {
                playerLogic.state.isRolling = false;
                playerGroup.userData.bodyMesh.rotation.x = 0; 
            } else {
                let rollSpeed = playerLogic.stats.baseSpeed * 2.5;
                dx = playerLogic.state.rollDir.x * rollSpeed;
                dz = playerLogic.state.rollDir.z * rollSpeed;
                playerGroup.userData.bodyMesh.rotation.x -= 0.5;
                playerLogic.state.invincibilityUntil = Math.max(playerLogic.state.invincibilityUntil, Date.now() + 100);
            }
        } else {
            if (keys.w) dz -= 1;
            if (keys.s) dz += 1;
            if (keys.a) dx -= 1;
            if (keys.d) dx += 1;
            
            if (joysticks.left.active) {
                dx += joysticks.left.dir.x; dz += joysticks.left.dir.y;
            }
            const moveLen = Math.sqrt(dx*dx + dz*dz);
            if (moveLen > 1) { dx /= moveLen; dz /= moveLen; }

            dx *= playerLogic.stats.baseSpeed;
            dz *= playerLogic.stats.baseSpeed;
        }

        if (dx !== 0 || dz !== 0) isMoving = true;

        // X, Z 축 분리 슬라이딩 충돌 처리 (조작감 향상)
        if (dx !== 0) {
            playerGroup.position.x += dx * dt;
            let stuck = false;
            for (let obs of obstacleMeshes) if (checkRectCollisionXZ(playerGroup.position.x, playerGroup.position.z, playerLogic.radius, obs)) stuck = true;
            if (stuck) playerGroup.position.x -= dx * dt;
        }
        if (dz !== 0) {
            playerGroup.position.z += dz * dt;
            let stuck = false;
            for (let obs of obstacleMeshes) if (checkRectCollisionXZ(playerGroup.position.x, playerGroup.position.z, playerLogic.radius, obs)) stuck = true;
            if (stuck) playerGroup.position.z -= dz * dt;
        }

        if (isMoving && !playerLogic.state.isRolling) {
            playerGroup.userData.lLeg.rotation.x = Math.sin(Date.now() * 0.015) * 0.5;
            playerGroup.userData.rLeg.rotation.x = -Math.sin(Date.now() * 0.015) * 0.5;
        } else {
            playerGroup.userData.lLeg.rotation.x = 0; playerGroup.userData.rLeg.rotation.x = 0;
        }

        playerGroup.position.x = Math.max(-1500 + playerLogic.radius, Math.min(1500 - playerLogic.radius, playerGroup.position.x));
        playerGroup.position.z = Math.max(-1500 + playerLogic.radius, Math.min(1500 - playerLogic.radius, playerGroup.position.z));

        // 무적 점멸
        if (Date.now() < playerLogic.state.invincibilityUntil) {
            playerGroup.userData.bodyMesh.material.transparent = true;
            playerGroup.userData.bodyMesh.material.opacity = (Math.floor(Date.now() / 100) % 2 === 0) ? 0.3 : 1;
        } else {
            playerGroup.userData.bodyMesh.material.transparent = false;
            playerGroup.userData.bodyMesh.material.opacity = 1;
        }
    }

    function updateCombat() {
        let isFiring = false;
        const wConfig = WEAPONS[playerLogic.weapon]; 
        const now = Date.now();
        
        if (joysticks.right.active && (Math.abs(joysticks.right.dir.x) > 0.1 || Math.abs(joysticks.right.dir.y) > 0.1)) {
            let targetX = playerGroup.position.x + joysticks.right.dir.x * 100;
            let targetZ = playerGroup.position.z + joysticks.right.dir.y * 100;
            playerGroup.lookAt(targetX, playerGroup.position.y, targetZ);
            isFiring = true;
        } else if (isAutoMode) {
            let closestDist = Infinity; let closestZombie = null;
            for (let z of zombies) {
                let dist = Math.sqrt((z.mesh.position.x - playerGroup.position.x)**2 + (z.mesh.position.z - playerGroup.position.z)**2);
                if (dist < closestDist) { closestDist = dist; closestZombie = z; }
            }
            if (closestZombie && closestDist <= wConfig.range) {
                playerGroup.lookAt(closestZombie.mesh.position.x, playerGroup.position.y, closestZombie.mesh.position.z);
                isFiring = true;
            } else {
                raycaster.setFromCamera(mouse, camera);
                const intersect = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, intersect);
                if (intersect) playerGroup.lookAt(intersect.x, playerGroup.position.y, intersect.z);
            }
        } else {
            raycaster.setFromCamera(mouse, camera);
            const intersect = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, intersect);
            if (intersect) playerGroup.lookAt(intersect.x, playerGroup.position.y, intersect.z);
            isFiring = mouse.isDown;
        }

        if (playerLogic.state.isReloading && now - playerLogic.state.reloadStartTime >= getPlayerStat('reloadTime')) {
            const maxMag = getPlayerStat('magSize');
            const needed = maxMag - playerLogic.state.ammo;
            if (playerLogic.state.totalAmmo === Infinity) playerLogic.state.ammo = maxMag;
            else {
                const take = Math.min(needed, playerLogic.state.totalAmmo);
                playerLogic.state.ammo += take; playerLogic.state.totalAmmo -= take;
            }
            playerLogic.state.isReloading = false;
        }
        
        if (isFiring && !playerLogic.state.isReloading && playerLogic.state.ammo > 0 && (now - playerLogic.state.lastFireTime >= getPlayerStat('fireRate'))) {
            const bulletDirCenter = new THREE.Vector3(0, 0, 1).applyQuaternion(playerGroup.quaternion);
            const pellets = wConfig.pellets || 1;
            const spread = wConfig.spread || 0;
            const bulletSpeed = 1200; // 프레임 보정 속도

            for (let i = 0; i < pellets; i++) {
                const bulletDir = bulletDirCenter.clone();
                if (pellets > 1) bulletDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), -spread + (spread * 2 * i / (pellets - 1)));
                
                const bulletPos = playerGroup.position.clone().add(bulletDirCenter.clone().multiplyScalar(25));
                bulletPos.y = 32.5; 

                let b = bulletPool.get();
                if(pellets > 1) b.mesh.scale.set(0.7,0.7,0.7); else b.mesh.scale.set(1,1,1);
                b.mesh.position.copy(bulletPos);
                b.vx = bulletDir.x * bulletSpeed;
                b.vz = bulletDir.z * bulletSpeed;
                b.life = wConfig.range / bulletSpeed; // 생명주기(초)
                activeBullets.push(b);
            }
            
            cameraShake = wConfig.shake; // 사격 시 카메라 쉐이크
            playerLogic.state.ammo--; playerLogic.state.lastFireTime = now;

            if (playerLogic.state.ammo === 0) { 
                if (playerLogic.state.totalAmmo > 0) { playerLogic.state.isReloading = true; playerLogic.state.reloadStartTime = now; }
                else if (playerLogic.weapon !== 'glock') {
                    playerLogic.weapon = 'glock'; playerLogic.state.ammo = getPlayerStat('magSize');
                    playerLogic.state.totalAmmo = Infinity; playerLogic.state.isReloading = false;
                    const oldGun = playerGroup.getObjectByName('equippedWeapon'); if (oldGun) playerGroup.remove(oldGun);
                    const newGun = createWeaponModel('glock'); newGun.name = 'equippedWeapon'; newGun.position.set(9, 4, 14); playerGroup.add(newGun);
                }
            }
        }
    }

    function updateZombies(dt) {
        const now = Date.now();
        for (let j = zombies.length - 1; j >= 0; j--) {
            let z = zombies[j];
            let dx = playerGroup.position.x - z.mesh.position.x;
            let dz = playerGroup.position.z - z.mesh.position.z;
            let distToPlayer = Math.sqrt(dx*dx + dz*dz);
            
            z.mesh.lookAt(playerGroup.position.x, z.mesh.position.y, playerGroup.position.z);

            if (distToPlayer > z.radius + playerLogic.radius + 2) {
                let dirX = dx / distToPlayer; let dirZ = dz / distToPlayer;
                z.mesh.position.x += dirX * z.speed * dt;
                for (let obs of obstacleMeshes) if (checkRectCollisionXZ(z.mesh.position.x, z.mesh.position.z, z.radius, obs)) z.mesh.position.x -= dirX * z.speed * dt;
                z.mesh.position.z += dirZ * z.speed * dt;
                for (let obs of obstacleMeshes) if (checkRectCollisionXZ(z.mesh.position.x, z.mesh.position.z, z.radius, obs)) z.mesh.position.z -= dirZ * z.speed * dt;
                
                z.mesh.position.x = Math.max(-1500 + z.radius, Math.min(1500 - z.radius, z.mesh.position.x));
                z.mesh.position.z = Math.max(-1500 + z.radius, Math.min(1500 - z.radius, z.mesh.position.z));

                z.mesh.userData.lArm.rotation.x = Math.PI / 2; z.mesh.userData.rArm.rotation.x = Math.PI / 2;
                z.mesh.userData.lLeg.rotation.x = Math.sin(now * 0.015) * 0.5; z.mesh.userData.rLeg.rotation.x = -Math.sin(now * 0.015) * 0.5;
            } else if (!playerLogic.state.isDead) {
                takeDamage(z.damage);
                z.mesh.userData.lArm.rotation.x = Math.PI / 2 + Math.sin(now * 0.02) * 1.5; z.mesh.userData.rArm.rotation.x = Math.PI / 2 - Math.sin(now * 0.02) * 1.5;
                z.mesh.userData.lLeg.rotation.x = 0; z.mesh.userData.rLeg.rotation.x = 0;
            }

            if ((z.type === 'red' || z.type === 'blue') && now - z.lastAttack > z.shootInterval && !playerLogic.state.isDead) {
                let baseAngle = Math.atan2(dz, dx);
                let angles = [baseAngle];
                if (z.type === 'blue') angles = [baseAngle - 0.25, baseAngle, baseAngle + 0.25];

                angles.forEach(ang => {
                    let eb = enemyBulletPool.get();
                    if(z.type === 'blue') { eb.mesh.scale.set(1.2,1.2,1.2); eb.mesh.material.color.setHex(0x0097e6); }
                    else { eb.mesh.scale.set(1,1,1); eb.mesh.material.color.setHex(0xff4757); }
                    
                    eb.mesh.position.copy(z.mesh.position); eb.mesh.position.y = z.type === 'blue' ? 55 : 41;
                    eb.vx = Math.cos(ang) * 480; eb.vz = Math.sin(ang) * 480;
                    eb.life = 2.5; eb.damage = z.damage;
                    activeEnemyBullets.push(eb);
                });
                z.lastAttack = now;
            }
        }
    }

    function updateEntities(dt) {
        const now = Date.now();
        // 총알 업데이트
        for (let i = activeBullets.length - 1; i >= 0; i--) {
            let b = activeBullets[i];
            b.mesh.position.x += b.vx * dt; b.mesh.position.z += b.vz * dt; b.life -= dt;
            let destroyed = b.life <= 0;
            
            if (!destroyed) {
                for (let obs of obstacleMeshes) {
                    if (b.mesh.position.x > obs.x && b.mesh.position.x < obs.x + obs.w && b.mesh.position.z > obs.z && b.mesh.position.z < obs.z + obs.d) { 
                        destroyed = true; break; 
                    }
                }
            }

            if (!destroyed) {
                for (let j = zombies.length - 1; j >= 0; j--) {
                    let z = zombies[j];
                    if (Math.sqrt((b.mesh.position.x - z.mesh.position.x)**2 + (b.mesh.position.z - z.mesh.position.z)**2) < z.radius) {
                        z.hp -= getPlayerStat('attack');
                        destroyed = true;
                        spawnParticles(z.mesh.position, 1, 0xff0000);
                        
                        // 물리적 피격감 (넉백)
                        z.mesh.position.x += b.vx * 0.01;
                        z.mesh.position.z += b.vz * 0.01;

                        if (z.hp <= 0) {
                            hitStopTime = now + 40; // 역경직
                            scene.remove(z.mesh); zombies.splice(j, 1);
                            
                            if (Math.random() < 0.05) spawnItem(z.mesh.position, 'health');
                            if (z.type === 'purple' && Math.random() < 0.20) spawnItem(z.mesh.position, 'uzi');
                            if (z.type === 'red' && Math.random() < 0.50) spawnItem(z.mesh.position, 'ak47');
                            if (z.type === 'blue' && Math.random() < 0.50) spawnItem(z.mesh.position, 'spas15');

                            if(!playerLogic.state.isDead){
                                playerLogic.progression.kills++; playerLogic.progression.xp++;
                                if(z.type === 'blue') playerLogic.progression.xp += 5; 
                                checkLevelUp();
                            }
                        }
                        break;
                    }
                }
            }
            if (destroyed) { bulletPool.release(b); activeBullets.splice(i, 1); }
        }

        // 적 총알 업데이트
        for (let i = activeEnemyBullets.length - 1; i >= 0; i--) {
            let eb = activeEnemyBullets[i];
            eb.mesh.position.x += eb.vx * dt; eb.mesh.position.z += eb.vz * dt; eb.life -= dt;
            let destroyed = eb.life <= 0;
            if (!destroyed) {
                for (let obs of obstacleMeshes) {
                    if (eb.mesh.position.x > obs.x && eb.mesh.position.x < obs.x + obs.w && eb.mesh.position.z > obs.z && eb.mesh.position.z < obs.z + obs.d) { destroyed = true; break; }
                }
            }
            if (!destroyed && !playerLogic.state.isDead && Math.sqrt((eb.mesh.position.x - playerGroup.position.x)**2 + (eb.mesh.position.z - playerGroup.position.z)**2) < playerLogic.radius) {
                takeDamage(eb.damage); destroyed = true;
            }
            if (destroyed) { enemyBulletPool.release(eb); activeEnemyBullets.splice(i, 1); }
        }

        // 파티클 업데이트
        for(let i = activeParticles.length - 1; i >= 0; i--) {
            let p = activeParticles[i]; 
            p.mesh.position.x += p.vx * dt; 
            p.mesh.position.y += p.vy * dt; 
            p.mesh.position.z += p.vz * dt; 
            p.vy -= 1000 * dt; // 중력
            if(p.mesh.position.y <= 1) p.mesh.position.y = 1; 
            p.life -= dt; 
            if(p.life <= 0) { particlePool.release(p); activeParticles.splice(i, 1); }
        }

        // 수류탄 및 폭발
        for (let i = thrownGrenades.length - 1; i >= 0; i--) {
            let g = thrownGrenades[i]; let t = (now - g.startTime) / g.duration;
            if (t >= 1) {
                let explosionRadius = 100 * (1 + playerLogic.upgrades.rangeGrenade * 0.1);
                const expMesh = new THREE.Mesh(new THREE.SphereGeometry(explosionRadius, 16, 16), new THREE.MeshBasicMaterial({color: 0xff4757, transparent: true, opacity: 0.8}));
                expMesh.position.set(g.targetX, 5, g.targetZ); scene.add(expMesh);
                explosions.push({ mesh: expMesh, life: 0.3, maxLife: 0.3 }); // 0.3초간 유지
                
                cameraShake = 30; // 폭발 카메라 쉐이크
                let dmg = 220 * (1 + playerLogic.upgrades.atkGrenade * 0.1);
                if (Math.sqrt((playerGroup.position.x - g.targetX)**2 + (playerGroup.position.z - g.targetZ)**2) <= explosionRadius + playerLogic.radius) takeDamage(dmg);
                
                for (let j = zombies.length - 1; j >= 0; j--) {
                    let z = zombies[j];
                    if (Math.sqrt((z.mesh.position.x - g.targetX)**2 + (z.mesh.position.z - g.targetZ)**2) <= explosionRadius + z.radius) {
                        z.hp -= dmg;
                        if (z.hp <= 0) {
                            scene.remove(z.mesh); zombies.splice(j, 1);
                            if (Math.random() < 0.05) spawnItem(z.mesh.position, 'health');
                            if(!playerLogic.state.isDead){
                                playerLogic.progression.kills++; playerLogic.progression.xp++;
                                checkLevelUp();
                            }
                        }
                    }
                }
                scene.remove(g.mesh); thrownGrenades.splice(i, 1);
            } else {
                g.mesh.position.x = g.startX + (g.targetX - g.startX) * t;
                g.mesh.position.z = g.startZ + (g.targetZ - g.startZ) * t;
                g.mesh.position.y = 40 + Math.sin(t * Math.PI) * 150; 
                g.mesh.rotation.x += 0.2; g.mesh.rotation.z += 0.2;
            }
        }

        for (let i = explosions.length - 1; i >= 0; i--) {
            let exp = explosions[i]; exp.life -= dt;
            exp.mesh.material.opacity = (exp.life / exp.maxLife) * 0.8;
            exp.mesh.scale.set(1 + (1 - exp.life/exp.maxLife)*0.5, 1 + (1 - exp.life/exp.maxLife)*0.5, 1 + (1 - exp.life/exp.maxLife)*0.5);
            if (exp.life <= 0) { scene.remove(exp.mesh); explosions.splice(i, 1); }
        }

        // 아이템 업데이트
        let labelsHTML = '';
        for(let i = items.length - 1; i >= 0; i--) {
            let item = items[i]; item.mesh.rotation.y += 3 * dt; 
            if (now - item.spawnTime > 10000) { scene.remove(item.mesh); items.splice(i, 1); continue; }
            
            if(Math.sqrt((item.mesh.position.x - playerGroup.position.x)**2 + (item.mesh.position.z - playerGroup.position.z)**2) < playerLogic.radius + 10 && !playerLogic.state.isDead) {
                if (item.type === 'health') {
                    if (playerLogic.state.hp < getPlayerStat('maxHp')) {
                        playerLogic.state.hp = Math.min(getPlayerStat('maxHp'), playerLogic.state.hp + 30);
                        scene.remove(item.mesh); items.splice(i, 1); continue;
                    }
                } else {
                    playerLogic.weapon = item.type;
                    playerLogic.state.ammo = getPlayerStat('magSize');
                    if(item.type === 'uzi') playerLogic.state.totalAmmo = 50;
                    else if(item.type === 'ak47') playerLogic.state.totalAmmo = 90;
                    else if(item.type === 'spas15') playerLogic.state.totalAmmo = 24;
                    playerLogic.state.isReloading = false; 
                    
                    const oldGun = playerGroup.getObjectByName('equippedWeapon'); if (oldGun) playerGroup.remove(oldGun);
                    const newGun = createWeaponModel(item.type); newGun.name = 'equippedWeapon'; newGun.position.set(9, 4, 14); playerGroup.add(newGun);
                    scene.remove(item.mesh); items.splice(i, 1); continue;
                }
            }
            const tempV = item.mesh.position.clone(); tempV.y += 15; tempV.project(camera);
            labelsHTML += `<div style="position:absolute; left:${(tempV.x*0.5+0.5)*window.innerWidth}px; top:${(tempV.y*-0.5+0.5)*window.innerHeight}px; transform:translate(-50%,-50%); color:${item.colorHex}; font-size:14px; font-weight:900; text-shadow:2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;">${item.label}</div>`;
        }
        document.getElementById('itemLabelsContainer').innerHTML = labelsHTML;
    }

    function updateCameraShake(dt) {
        camera.position.x += (playerGroup.position.x - camera.position.x) * 5 * dt;
        camera.position.z += (playerGroup.position.z - camera.position.z) * 5 * dt;
        camera.position.y = 650; 

        if (cameraShake > 0) {
            camera.position.x += (Math.random() - 0.5) * cameraShake;
            camera.position.z += (Math.random() - 0.5) * cameraShake;
            cameraShake -= dt * 60; // 초당 60의 속도로 감쇠
            if (cameraShake < 0) cameraShake = 0;
        }
    }

    function processEscapeSequence(dt) {
        escapeData.heli.userData.rotor.rotation.y += 15 * dt; 
        if (escapeData.phase === 1) {
            escapeData.heli.position.y -= 300 * dt;
            if (escapeData.heli.position.y <= 300) escapeData.phase = 2; 
        } else if (escapeData.phase === 2) {
            playerGroup.position.y += 180 * dt; 
            if (playerGroup.position.y >= 250) {
                playerGroup.visible = false;
                escapeData.phase = 3;
            }
        } else if (escapeData.phase === 3) {
            escapeData.heli.position.y += 300 * dt; 
            if (escapeData.heli.position.y > 1000) {
                escapeData.phase = 4;
                document.getElementById('stageClearModal').style.display = 'flex';
            }
        }
        renderer.render(scene, camera);
    }

    // --- 메인 루프 ---
    function animate(time) {
        requestAnimationFrame(animate);
        
        let dt = (time - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; // 브라우저 탭 비활성화 시 프레임 점프 방지
        lastTime = time;

        if (escapeData.active) { processEscapeSequence(dt); return; }
        if (isGamePaused || isLevelingUp) { renderer.render(scene, camera); return; }
        
        const now = Date.now();
        
        // 역경직 (Hitstop) 처리
        if (now < hitStopTime) {
            renderer.render(scene, camera);
            return;
        }

        if (playerLogic.state.isDead) {
            let remain = (playerLogic.stats.respawnTime - (now - playerLogic.state.deathTime)) / 1000;
            if (remain <= 0) respawn();
            else document.getElementById('respawnTimer').innerText = remain.toFixed(1);
        } else {
            updatePlayerMovement(dt);
            updateCombat();
            
            const targetKills = stage * 100;
            if (playerLogic.progression.kills >= targetKills && !escapePoint) { spawnEscapePoint(); }

            if (escapePoint && Math.sqrt((playerGroup.position.x - escapePoint.x)**2 + (playerGroup.position.z - escapePoint.z)**2) < 50) {
                escapeData.active = true; escapeData.phase = 1;
                escapeData.heli = createHelicopter(); escapeData.heli.position.set(playerGroup.position.x, 1000, playerGroup.position.z);
                scene.add(escapeData.heli); keys.w = keys.a = keys.s = keys.d = false; joysticks.left.active = false;
            }
        }

        spawnZombies();
        updateZombies(dt);
        updateEntities(dt);
        updateCameraShake(dt);

        // UI 갱신 (기존 동일)
        const currentHp = playerLogic.state.hp; const maxHp = getPlayerStat('maxHp'); const vElement = document.getElementById('vignette');
        if (currentHp / maxHp < 0.3 && !playerLogic.state.isDead) { if (!vElement.classList.contains('active')) vElement.classList.add('active'); } 
        else { if (vElement.classList.contains('active')) vElement.classList.remove('active'); }

        const wName = WEAPONS[playerLogic.weapon].name; const tAmmo = playerLogic.state.totalAmmo === Infinity ? "∞" : playerLogic.state.totalAmmo;
        const targetKills = stage * 100;
        document.getElementById('stageDisplay').innerText = `STAGE: ${stage}`;
        document.getElementById('hpDisplay').innerText = `HP: ${currentHp} / ${maxHp}`;
        document.getElementById('ammoDisplay').innerText = playerLogic.state.isReloading ? `[${wName}] RELOADING...` : `[${wName}] AMMO: ${playerLogic.state.ammo} / ${tAmmo}`;
        document.getElementById('killDisplay').innerText = `KILLS: ${playerLogic.progression.kills} / ${targetKills}`;
        
        const totalUpg = playerLogic.upgrades.atkGlock + playerLogic.upgrades.atkUzi + playerLogic.upgrades.atkAk + playerLogic.upgrades.atkSpas + playerLogic.upgrades.atkGrenade + playerLogic.upgrades.rangeGrenade + playerLogic.upgrades.reload + playerLogic.upgrades.hp;
        if (totalUpg >= 80) document.getElementById('xpDisplay').innerText = `LV.MAX (ALL UPGRADES MAXED)`;
        else document.getElementById('xpDisplay').innerText = `LV.${playerLogic.progression.level} (XP: ${playerLogic.progression.xp} / ${Math.floor(5 + playerLogic.progression.level * 0.3)})`;

        const reloadUI = document.getElementById('reloadFloatingText');
        if (playerLogic.state.isReloading && !playerLogic.state.isDead) {
            reloadUI.style.display = 'block'; const tempV = playerGroup.position.clone(); tempV.y += 45; tempV.project(camera);
            reloadUI.style.left = `${(tempV.x * 0.5 + 0.5) * window.innerWidth}px`; reloadUI.style.top = `${(tempV.y * -0.5 + 0.5) * window.innerHeight}px`;
        } else reloadUI.style.display = 'none';

        const miniCtx = document.getElementById('minimap').getContext('2d');
        miniCtx.clearRect(0, 0, 150, 150);
        if (!playerLogic.state.isDead) {
            const cx = 65, cy = 65; const scale = 130 / 2500; 
            miniCtx.fillStyle = 'rgba(100, 100, 100, 0.8)';
            for (let obs of obstaclesData) miniCtx.fillRect(cx+(obs.x-playerGroup.position.x)*scale - (obs.w*scale)/2, cy+(obs.z-playerGroup.position.z)*scale - (obs.d*scale)/2, obs.w*scale, obs.d*scale);
            if (escapePoint) {
                miniCtx.fillStyle = '#f1c40f';
                miniCtx.beginPath(); miniCtx.arc(cx+(escapePoint.x-playerGroup.position.x)*scale, cy+(escapePoint.z-playerGroup.position.z)*scale, 4, 0, Math.PI*2); miniCtx.fill();
            }
            for (let item of items) {
                miniCtx.fillStyle = item.colorHex; miniCtx.fillRect(cx+(item.mesh.position.x-playerGroup.position.x)*scale - 2, cy+(item.mesh.position.z-playerGroup.position.z)*scale - 2, 4, 4);
            }
            for (let z of zombies) {
                if (z.type === 'blue') miniCtx.fillStyle = '#0097e6'; else if (z.type === 'red') miniCtx.fillStyle = '#ff7675'; else if (z.type === 'purple') miniCtx.fillStyle = '#a29bfe'; else miniCtx.fillStyle = '#55efc4';
                miniCtx.beginPath(); miniCtx.arc(cx+(z.mesh.position.x-playerGroup.position.x)*scale, cy+(z.mesh.position.z-playerGroup.position.z)*scale, z.type==='blue'?3.5:2.5, 0, Math.PI*2); miniCtx.fill();
            }
            miniCtx.fillStyle = '#0984e3'; miniCtx.beginPath(); miniCtx.arc(cx, cy, 3, 0, Math.PI * 2); miniCtx.fill();
            miniCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; miniCtx.lineWidth = 1.5; miniCtx.beginPath(); miniCtx.moveTo(cx, cy);
            const bulletDir = new THREE.Vector3(0, 0, 1).applyQuaternion(playerGroup.quaternion); miniCtx.lineTo(cx + bulletDir.x * 12, cy + bulletDir.z * 12); miniCtx.stroke();
        }

        const rollTimeLeft = Math.max(0, playerLogic.state.rollCooldown - (now - playerLogic.state.lastRollTime));
        const rollPercent = (rollTimeLeft / playerLogic.state.rollCooldown) * 100;
        document.getElementById('rollCooldownOverlay').style.height = `${rollPercent}%`;
        if (rollPercent === 0 && !playerLogic.state.isDead) document.getElementById('rollUI').className = 'skill-icon ready';
        else document.getElementById('rollUI').className = 'skill-icon';

        document.getElementById('grenadeCount').innerText = playerLogic.state.grenades;
        if (playerLogic.state.grenades > 0 && !playerLogic.state.isDead) document.getElementById('grenadeUI').className = 'skill-icon grenade-ready';
        else document.getElementById('grenadeUI').className = 'skill-icon';

        const epUI = document.getElementById('escapePointer');
        const epTopMsg = document.getElementById('escapeTopMsg');

        if (escapePoint && !escapeData.active && !playerLogic.state.isDead) {
            epTopMsg.style.display = 'block'; epUI.style.display = 'flex';
            const dx = escapePoint.x - playerGroup.position.x; const dz = escapePoint.z - playerGroup.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz); const angle = Math.atan2(dz, dx);
            if (dist < 250) { epUI.style.display = 'none'; } 
            else {
                const margin = 100; const w = window.innerWidth / 2 - margin; const h = window.innerHeight / 2 - margin;
                let px = Math.cos(angle) * 10000; let py = Math.sin(angle) * 10000;
                if (Math.abs(px) > w) { py = py * (w / Math.abs(px)); px = Math.sign(px) * w; }
                if (Math.abs(py) > h) { px = px * (h / Math.abs(py)); py = Math.sign(py) * h; }
                epUI.style.left = (window.innerWidth / 2 + px) + 'px'; epUI.style.top = (window.innerHeight / 2 + py) + 'px';
                document.getElementById('escapePointerArrow').style.transform = `rotate(${angle}rad)`;
                if (px < 0) epUI.style.flexDirection = 'row-reverse'; else epUI.style.flexDirection = 'row';
            }
        } else { epTopMsg.style.display = 'none'; epUI.style.display = 'none'; }

        renderer.render(scene, camera);
    } 

    function showLevelUpModal() {
        isLevelingUp = true;
        document.getElementById('levelUpModal').style.display = 'flex';
        keys.w = keys.a = keys.s = keys.d = false;

        ['AtkGlock', 'AtkUzi', 'AtkAk', 'AtkSpas', 'AtkGrenade', 'RangeGrenade', 'Reload', 'Hp'].forEach(type => {
            let key = type.charAt(0).toLowerCase() + type.slice(1);
            let btn = document.getElementById(`btnUpg${type}`);
            document.getElementById(`desc${type}`).innerText = `현재 레벨: ${playerLogic.upgrades[key]}/10`;
            btn.disabled = playerLogic.upgrades[key] >= 10;
        });
    }

    window.applyUpgrade = function(type) {
        if (playerLogic.upgrades[type] < 10) {
            playerLogic.upgrades[type]++;
            if (type === 'hp') playerLogic.state.hp += 20;
            document.getElementById('levelUpModal').style.display = 'none';
            isLevelingUp = false;
            checkLevelUp();
        }
    };

    function handleTouchStart(e, zone) {
        e.preventDefault();
        for(let i=0; i<e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            let joy = joysticks[zone];
            if(!joy.active) {
                joy.active = true; joy.id = t.identifier;
                joy.origin = { x: t.clientX, y: t.clientY }; joy.dir = { x: 0, y: 0 };
                joy.baseEl.style.left = joy.origin.x + 'px'; joy.baseEl.style.top = joy.origin.y + 'px'; joy.baseEl.style.display = 'block';
                joy.knobEl.style.left = joy.origin.x + 'px'; joy.knobEl.style.top = joy.origin.y + 'px'; joy.knobEl.style.display = 'block';
            }
        }
    }
    function handleTouchMove(e) {
        if (isLevelingUp || isGamePaused) return; // 팝업 창 스크롤 허용
        e.preventDefault();
        for(let i=0; i<e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            for (let key in joysticks) {
                let joy = joysticks[key];
                if(joy.active && joy.id === t.identifier) {
                    let dx = t.clientX - joy.origin.x; let dy = t.clientY - joy.origin.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist > maxJoyDist) { dx = (dx/dist)*maxJoyDist; dy = (dy/dist)*maxJoyDist; }
                    joy.knobEl.style.left = (joy.origin.x + dx) + 'px'; joy.knobEl.style.top = (joy.origin.y + dy) + 'px';
                    joy.dir.x = dx / maxJoyDist; joy.dir.y = dy / maxJoyDist;
                }
            }
        }
    }
    function handleTouchEnd(e) {
        if (isLevelingUp || isGamePaused) return; // 팝업 창 스크롤 허용
        e.preventDefault();
        for(let i=0; i<e.changedTouches.length; i++) {
            let t = e.changedTouches[i];
            for (let key in joysticks) {
                let joy = joysticks[key];
                if(joy.active && joy.id === t.identifier) {
                    joy.active = false; joy.id = null; joy.dir = { x: 0, y: 0 };
                    joy.baseEl.style.display = 'none'; joy.knobEl.style.display = 'none';
                }
            }
        }
    }
    document.getElementById('leftZone').addEventListener('touchstart', (e) => handleTouchStart(e, 'left'), {passive: false});
    document.getElementById('rightZone').addEventListener('touchstart', (e) => handleTouchStart(e, 'right'), {passive: false});
    window.addEventListener('touchmove', handleTouchMove, {passive: false});
    window.addEventListener('touchend', handleTouchEnd, {passive: false});
    window.addEventListener('touchcancel', handleTouchEnd, {passive: false});

    const triggerRollAction = () => {
        if (!playerLogic.state.isRolling && !playerLogic.state.isDead && (Date.now() - playerLogic.state.lastRollTime >= playerLogic.state.rollCooldown)) {
            playerLogic.state.isRolling = true; playerLogic.state.lastRollTime = Date.now();
            let rdx = 0, rdz = 0;
            if (joysticks.left.active) { rdx = joysticks.left.dir.x; rdz = joysticks.left.dir.y; }
            else { if(keys.w) rdz -= 1; if(keys.s) rdz += 1; if(keys.a) rdx -= 1; if(keys.d) rdx += 1; }
            if (rdx !== 0 || rdz !== 0) { const len = Math.sqrt(rdx*rdx + rdz*rdz); playerLogic.state.rollDir.set(rdx/len, 0, rdz/len); } 
            else playerLogic.state.rollDir.copy(new THREE.Vector3(0, 0, 1).applyQuaternion(playerGroup.quaternion));
        }
    };
    document.getElementById('rollUI').addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); triggerRollAction(); }, {passive:false});
    document.getElementById('rollUI').addEventListener('mousedown', (e) => { e.preventDefault(); e.stopPropagation(); triggerRollAction(); });

    const triggerGrenadeAction = () => { if (!playerLogic.state.isDead && playerLogic.state.grenades > 0) triggerGrenadeLogic(); };
    document.getElementById('grenadeUI').addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); triggerGrenadeAction(); }, {passive:false});
    document.getElementById('grenadeUI').addEventListener('mousedown', (e) => { e.preventDefault(); e.stopPropagation(); triggerGrenadeAction(); });

    window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (!isLevelingUp && !escapeData.active && (e.code === 'KeyP' || k === 'p' || k === 'ㅔ')) {
            isGamePaused = !isGamePaused; document.getElementById('pauseMsg').style.display = isGamePaused ? 'block' : 'none';
        }
        if (e.code === 'KeyT' || k === 't' || k === 'ㅅ') {
            isAutoMode = !isAutoMode; const btn = document.getElementById('autoBtn');
            btn.innerText = `오토: ${isAutoMode ? 'ON' : 'OFF'} [T]`;
            if(isAutoMode) btn.classList.add('active'); else btn.classList.remove('active');
        }
        if (e.code === 'KeyW' || e.code === 'ArrowUp' || k === 'w' || k === 'ㅈ') keys.w = true;
        if (e.code === 'KeyS' || e.code === 'ArrowDown' || k === 's' || k === 'ㄴ') keys.s = true;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft' || k === 'a' || k === 'ㅁ') keys.a = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight' || k === 'd' || k === 'ㅇ') keys.d = true;
        if ((e.code === 'KeyR' || k === 'r' || k === 'ㄱ') && !playerLogic.state.isReloading && !playerLogic.state.isDead && playerLogic.state.ammo < getPlayerStat('magSize') && playerLogic.state.totalAmmo > 0) {
            playerLogic.state.isReloading = true; playerLogic.state.reloadStartTime = Date.now();
        }
        if (e.code === 'ShiftLeft') triggerRollAction();
        if (e.code === 'Space') triggerGrenadeAction();
        if (e.code === 'KeyC' || k === 'c' || k === 'ㅊ') {
            const panel = document.getElementById('consolePanel'); panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
    });

    window.addEventListener('keyup', (e) => {
        const k = e.key.toLowerCase();
        if (e.code === 'KeyW' || e.code === 'ArrowUp' || k === 'w' || k === 'ㅈ') keys.w = false;
        if (e.code === 'KeyS' || e.code === 'ArrowDown' || k === 's' || k === 'ㄴ') keys.s = false;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft' || k === 'a' || k === 'ㅁ') keys.a = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight' || k === 'd' || k === 'ㅇ') keys.d = false;
    });

    window.addEventListener('blur', () => { keys.w = keys.a = keys.s = keys.d = false; mouse.isDown = false; });
    window.addEventListener('mousemove', (e) => { mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1; });
    window.addEventListener('mousedown', (e) => { if(e.button === 0) mouse.isDown = true; });
    window.addEventListener('mouseup', (e) => { if(e.button === 0) mouse.isDown = false; });
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

    document.getElementById('pauseBtn').onclick = () => { if (!isLevelingUp) { isGamePaused = !isGamePaused; document.getElementById('pauseMsg').style.display = isGamePaused ? 'block' : 'none'; } };
    document.getElementById('autoBtn').onclick = () => { isAutoMode = !isAutoMode; const btn = document.getElementById('autoBtn'); btn.innerText = `오토: ${isAutoMode ? 'ON' : 'OFF'} [T]`; if(isAutoMode) btn.classList.add('active'); else btn.classList.remove('active'); };
    document.getElementById('consoleBtn').onclick = () => { const panel = document.getElementById('consolePanel'); panel.style.display = panel.style.display === 'block' ? 'none' : 'block'; };
    document.getElementById('btnKillSelf').onclick = () => { if(!playerLogic.state.isDead) die(); };
    document.getElementById('btnClearMob').onclick = () => { zombies.forEach(z => scene.remove(z.mesh)); zombies = []; activeEnemyBullets.forEach(b => b.mesh.visible = false); activeEnemyBullets = []; };
    document.getElementById('btnLvlUp').onclick = () => { if(!isLevelingUp) { playerLogic.progression.xp = Math.floor(5 + playerLogic.progression.level * 0.3); checkLevelUp(); } };
    document.getElementById('c_godMode').onchange = (e) => { godMode = e.target.checked; };

    requestAnimationFrame(animate); // 최초 프레임 시작
}; 
</script>
</body>
</html>
