<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dungeon Shooter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;user-select:none}
canvas{display:block;touch-action:none}
#hud{position:absolute;top:12px;left:12px;color:#fff;pointer-events:none;z-index:10;display:flex;flex-direction:column;gap:4px;text-shadow:1px 1px 2px rgba(0,0,0,.9)}
.hi{font-size:12px;font-weight:700;background:rgba(0,0,0,.55);padding:4px 9px;border-radius:5px;border-left:3px solid #00a8ff;letter-spacing:.4px}
.hi.hp{border-color:#ff4757}.hi.xp{border-color:#2ed573}.hi.kills{border-color:#ffa502}.hi.fl{border-color:#f1c40f}.hi.rm{border-color:#a29bfe}
#roomAnnounce{position:absolute;top:16%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:900;color:#f1c40f;text-shadow:0 0 20px #f1c40f,2px 2px 8px #000;z-index:20;pointer-events:none;opacity:0;transition:opacity .4s;letter-spacing:4px;text-align:center}
#roomAnnounce.show{opacity:1}
#roomSub{font-size:15px;color:#dfe4ea;display:block;margin-top:6px;letter-spacing:1px}
#deathScreen,#endScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.82);display:none;justify-content:center;align-items:center;z-index:50;flex-direction:column;text-align:center}
#deathScreen h1{color:#ff4757;font-size:52px;letter-spacing:6px;margin-bottom:8px}
#endScreen h1{color:#f1c40f;font-size:48px;letter-spacing:4px;margin-bottom:8px}
#deathScreen p,#endScreen p{color:#dfe4ea;font-size:15px;margin-bottom:18px;max-width:480px;line-height:1.6}
.abtn{padding:13px 38px;font-size:16px;font-weight:700;background:#f1c40f;color:#000;border:none;border-radius:8px;cursor:pointer;transition:.15s}
.abtn:hover{background:#ffeaa7;transform:scale(1.03)}
#levelUpModal,#relicModal{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:60}
.mc{background:#2f3542;padding:20px;border-radius:14px;text-align:center;color:#fff;width:420px;max-width:92vw;border:2px solid #2ed573;max-height:92vh;overflow-y:auto}
.mc.rl{border-color:#e056fd;box-shadow:0 0 25px rgba(224,86,253,.4)}
.mc h2{margin:0 0 5px;font-size:22px;letter-spacing:2px}
.mc p{color:#a4b0be;font-size:12px;margin-bottom:10px}
.ug{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ub{width:100%;padding:9px 5px;font-size:11px;font-weight:700;background:#57606f;color:#fff;border:none;border-radius:7px;cursor:pointer;transition:.15s}
.ub:hover:not(:disabled){background:#747d8c;transform:scale(1.02)}.ub:disabled{opacity:.4;cursor:not-allowed}
.ud{font-size:10px;color:#a4b0be;display:block;margin-top:2px}
.rg{display:flex;flex-direction:column;gap:9px}
.rb{padding:12px;background:#3d3454;border:2px solid #8854d0;border-radius:10px;cursor:pointer;transition:.15s;text-align:left;color:#fff}
.rb:hover{background:#4a3d6a;border-color:#e056fd;transform:scale(1.01)}
.rn{font-size:15px;font-weight:800;color:#e056fd;margin-bottom:3px}
.rd{font-size:11px;color:#a4b0be;line-height:1.4}
#vignette{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;box-shadow:inset 0 0 150px rgba(255,0,0,.6);opacity:0;transition:opacity .3s}
@keyframes hb{0%{opacity:.2}50%{opacity:.8}100%{opacity:.2}}
#vignette.active{animation:hb .8s infinite}
#minimap{position:absolute;top:12px;right:12px;border:2px solid #555;border-radius:8px;background:rgba(0,0,0,.7);z-index:10;pointer-events:none}
#skillsUI{position:absolute;bottom:20px;right:20px;display:flex;gap:10px;z-index:30}
.si{width:52px;height:52px;background:rgba(0,0,0,.6);border:2px solid #555;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer}
.si.ready{border-color:#00a8ff;box-shadow:0 0 8px rgba(0,168,255,.5)}
.si.gr{border-color:#ff4757;box-shadow:0 0 8px rgba(255,71,87,.5)}
.sk{color:#fff;font-weight:700;font-size:8px}.sn{color:#00a8ff;font-weight:800;font-size:12px}.sn.gn{color:#ff4757}
.sc{color:#fff;font-size:10px;font-weight:700}
.scd{position:absolute;bottom:0;left:0;width:100%;background:rgba(255,71,87,.5);z-index:1;transition:height .1s linear}
#doorHint{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);color:#2ed573;font-size:17px;font-weight:700;text-shadow:0 0 10px #2ed573;z-index:15;pointer-events:none;display:none;letter-spacing:2px}
.touch-zone{position:absolute;top:0;height:100vh;width:50vw;z-index:8;touch-action:none}
#leftZone{left:0}#rightZone{right:0}
.jb{position:absolute;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.25);transform:translate(-50%,-50%);display:none;z-index:9;pointer-events:none}
.jk{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.5);transform:translate(-50%,-50%);display:none;z-index:9;pointer-events:none}
#autoBtn{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:30;padding:4px 12px;background:rgba(0,0,0,.5);color:#fff;border:1px solid #555;cursor:pointer;border-radius:5px;font-weight:600;font-size:11px}
#autoBtn.active{background:rgba(46,213,115,.4);border-color:#2ed573}
#npcBubble{position:absolute;display:none;background:rgba(0,0,0,.85);color:#fff;padding:9px 14px;border-radius:10px;border:1px solid #f1c40f;font-size:12px;max-width:260px;z-index:20;pointer-events:none;line-height:1.5;text-align:center}
#enterHint{position:absolute;display:none;color:#f1c40f;font-size:20px;font-weight:800;text-shadow:0 0 15px #f1c40f;z-index:15;pointer-events:none;letter-spacing:3px;text-align:center}
@keyframes fY{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-8px)}}
#enterHint{animation:fY 1.5s infinite}
#relicHud{position:absolute;bottom:18px;left:12px;display:flex;gap:5px;z-index:10;pointer-events:none;flex-wrap:wrap;max-width:280px}
.rhi{background:rgba(60,30,80,.8);border:1px solid #8854d0;border-radius:5px;padding:2px 7px;font-size:10px;color:#e056fd;font-weight:700}
</style>
</head>
<body>
<div id="game-container"></div>
<div id="vignette"></div>
<div id="leftZone" class="touch-zone"></div><div id="rightZone" class="touch-zone"></div>
<div id="joyBaseL" class="jb"></div><div id="joyKnobL" class="jk"></div>
<div id="joyBaseR" class="jb"></div><div id="joyKnobR" class="jk"></div>
<div id="roomAnnounce"><span id="roomTitle"></span><span id="roomSub"></span></div>
<div id="doorHint">CLEAR! →</div>
<div id="npcBubble"></div>
<div id="enterHint">▼ ENTER THE TOWER ▼</div>
<canvas id="minimap" width="140" height="140"></canvas>
<div id="skillsUI">
<div id="rollUI" class="si ready" ontouchstart="event.preventDefault();event.stopPropagation();doRoll()" onmousedown="event.preventDefault();doRoll()"><span class="sk">SHIFT</span><span class="sn">ROLL</span><div id="rollCD" class="scd" style="height:0%"></div></div>
<div id="grenadeUI" class="si gr" ontouchstart="event.preventDefault();event.stopPropagation();doGrenade()" onmousedown="event.preventDefault();doGrenade()"><span class="sk">SPACE</span><span class="sn gn">BOMB</span><span class="sc">x<span id="gCnt">3</span></span></div>
</div>
<div id="hud">
<div class="hi fl" id="floorD">FLOOR 1</div>
<div class="hi rm" id="roomD">ROOM 1/6</div>
<div class="hi hp" id="hpD">HP: 100/100</div>
<div class="hi" id="ammoD">[G17] 17/∞</div>
<div class="hi xp" id="xpD">LV.0</div>
<div class="hi kills" id="killD">KILLS: 0</div>
</div>
<div id="relicHud"></div>
<div id="deathScreen"><h1>YOU DIED</h1><p>Floor <span id="dFloor">1</span> — <span id="dKills">0</span> kills</p><button class="abtn" onclick="fullRestart()">RETRY</button></div>
<div id="endScreen"><h1>🏆 VICTORY 🏆</h1><p id="endMsg"></p><button class="abtn" style="margin-top:16px" onclick="fullRestart()">PLAY AGAIN</button></div>
<div id="levelUpModal"><div class="mc"><h2 style="color:#2ed573">LEVEL UP!</h2><p>업그레이드 선택</p><div class="ug" id="upgGrid"></div></div></div>
<div id="relicModal"><div class="mc rl"><h2 style="color:#e056fd">✦ RELIC ✦</h2><p>유물을 선택하세요</p><div class="rg" id="relicGrid"></div></div></div>
<button id="autoBtn" onclick="toggleAuto()">AUTO:OFF [T]</button>

<script>
window.onload=function(){
const W={glock:{name:'G17',dmg:15,rate:280,mag:17,rld:1100,range:700,uk:'aG',shake:2},uzi:{name:'UZI',dmg:9,rate:70,mag:50,rld:1400,range:550,uk:'aU',shake:1.5},ak47:{name:'AK47',dmg:24,rate:140,mag:30,rld:1700,range:900,uk:'aK',shake:4},spas:{name:'SP15',dmg:24,rate:550,mag:6,rld:1900,pellets:5,spread:.25,range:380,uk:'aS',shake:7}};
const UPGD=[{k:'aG',l:'🔫 G17 DMG+10%'},{k:'aU',l:'💨 UZI DMG+10%'},{k:'aK',l:'💥 AK47 DMG+10%'},{k:'aS',l:'🔥 SP15 DMG+10%'},{k:'aB',l:'💣 Bomb DMG+10%'},{k:'aBR',l:'💥 Bomb Range+10%'},{k:'rld',l:'⚡ Reload-10%'},{k:'hp',l:'❤️ MaxHP+20'}];
const ALL_RELICS=[
{id:'iron_heart',name:'강철 심장',desc:'최대 HP +40, 즉시 회복',icon:'❤️‍🔥',fn(){P.base.maxHp+=40;P.s.hp=Math.min(P.s.hp+40,stat('maxHp'))}},
{id:'heavy_bullets',name:'중량 탄환',desc:'모든 무기 대미지 +25%',icon:'🔩',fn(){RF.dmgM+=.25}},
{id:'quick_fingers',name:'빠른 손놀림',desc:'발사 속도 20% 증가',icon:'⚡',fn(){RF.rateM*=.8}},
{id:'elastic_clip',name:'확장 탄창',desc:'모든 무기 탄창 +50%',icon:'📎',fn(){RF.magM+=.5;P.s.ammo=stat('mag')}},
{id:'vampire_fang',name:'흡혈의 송곳니',desc:'적 처치 시 HP 3 회복',icon:'🧛',fn(){RF.vamp+=3}},
{id:'blast_shield',name:'폭발 방어막',desc:'폭발 피해 면역',icon:'🛡️',fn(){RF.blastImm=true}},
{id:'shadow_cloak',name:'그림자 망토',desc:'구르기 쿨타임 50% 감소',icon:'🌑',fn(){P.s.rollCD=Math.max(500,P.s.rollCD*.5)}},
{id:'lucky_clover',name:'행운의 클로버',desc:'아이템 드롭률 2배',icon:'🍀',fn(){RF.dropM*=2}},
{id:'grenade_pouch',name:'수류탄 주머니',desc:'즉시 수류탄 +3, 매 층 +3',icon:'💣',fn(){RF.extraG+=3;P.s.grenades+=3}},
{id:'phoenix_feather',name:'불사조의 깃털',desc:'층당 1회 사망 시 HP 40%로 부활',icon:'🔥',fn(){RF.phoenix++}},
{id:'titanium_armor',name:'티타늄 아머',desc:'받는 피해 25% 감소',icon:'🪖',fn(){RF.dmgRed+=.25}},
{id:'adrenaline',name:'아드레날린 주사',desc:'이동속도 20% 증가',icon:'💉',fn(){P.base.spd*=1.2}}
];

const ROOM_TPL={
combat_open:{covers:[{x:-140,z:-140,w:70,d:70},{x:140,z:140,w:70,d:70},{x:-140,z:140,w:50,d:90},{x:140,z:-140,w:90,d:50}],dcov:[{x:0,z:-80,w:50,d:20},{x:0,z:80,w:50,d:20}]},
combat_cross:{walls:[{x:0,z:-200,w:240,d:25},{x:0,z:200,w:240,d:25},{x:-200,z:0,w:25,d:240},{x:200,z:0,w:25,d:240}],covers:[{x:-100,z:-100,w:50,d:50},{x:100,z:100,w:50,d:50}],dcov:[{x:-100,z:100,w:40,d:40},{x:100,z:-100,w:40,d:40}]},
combat_pillars:{covers:[{x:-180,z:-180,w:60,d:60},{x:180,z:-180,w:60,d:60},{x:-180,z:180,w:60,d:60},{x:180,z:180,w:60,d:60},{x:0,z:0,w:80,d:80}],dcov:[{x:-90,z:0,w:40,d:40},{x:90,z:0,w:40,d:40}]},
combat_corridor:{walls:[{x:-80,z:0,w:20,d:550},{x:80,z:0,w:20,d:550}],covers:[{x:0,z:-160,w:50,d:35},{x:0,z:160,w:50,d:35}],dcov:[{x:0,z:0,w:60,d:25}]},
combat_arena:{covers:[{x:-200,z:0,w:50,d:100},{x:200,z:0,w:50,d:100},{x:0,z:-200,w:100,d:50},{x:0,z:200,w:100,d:50}],dcov:[{x:-100,z:-100,w:40,d:40},{x:100,z:100,w:40,d:40}]},
boss:{covers:[{x:-220,z:-220,w:60,d:60},{x:220,z:-220,w:60,d:60},{x:-220,z:220,w:60,d:60},{x:220,z:220,w:60,d:60}],dcov:[{x:0,z:-240,w:50,d:50},{x:0,z:240,w:50,d:50},{x:-110,z:0,w:45,d:45},{x:110,z:0,w:45,d:45}]}
};
const CK=Object.keys(ROOM_TPL).filter(k=>k.startsWith('combat'));

const sc=new THREE.Scene();sc.background=new THREE.Color(0x0e0e1a);sc.fog=new THREE.Fog(0x0e0e1a,500,1500);
const cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,2000);cam.rotation.set(-Math.PI/2,0,0);
const ren=new THREE.WebGLRenderer({antialias:true});ren.setSize(innerWidth,innerHeight);ren.shadowMap.enabled=true;ren.setPixelRatio(Math.min(devicePixelRatio,2));
document.getElementById('game-container').appendChild(ren.domElement);
sc.add(new THREE.AmbientLight(0x606070,1.2));
const dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(80,300,80);dl.castShadow=true;dl.shadow.camera.left=-600;dl.shadow.camera.right=600;dl.shadow.camera.top=600;dl.shadow.camera.bottom=-600;sc.add(dl);

const mFloor=new THREE.MeshLambertMaterial({color:0x2d2d3e});
const mWall=new THREE.MeshLambertMaterial({color:0x4a4a5e});
const mCover=new THREE.MeshLambertMaterial({color:0x636e72});
const mDCov=new THREE.MeshLambertMaterial({color:0x8B6914});
const mDoor=new THREE.MeshLambertMaterial({color:0x2ed573,transparent:true,opacity:.7});
const mDoorL=new THREE.MeshLambertMaterial({color:0xff4757,transparent:true,opacity:.7});

const RS=900,WH=120,WT=20,DW=100;

const keys={w:0,a:0,s:0,d:0};const mouse={x:0,y:0,down:false};
const ray=new THREE.Raycaster();const gP=new THREE.Plane(new THREE.Vector3(0,1,0),0);
let paused=0,lvlUp=0,autoMode=0,relicPick=0;
let camShake=0,hitStop=0,lastT=performance.now();
const maxJD=50;
const joys={left:{active:0,id:null,o:{x:0,y:0},d:{x:0,y:0},bEl:document.getElementById('joyBaseL'),kEl:document.getElementById('joyKnobL')},right:{active:0,id:null,o:{x:0,y:0},d:{x:0,y:0},bEl:document.getElementById('joyBaseR'),kEl:document.getElementById('joyKnobR')}};

let gPhase='lobby',floor=1,roomIdx=0,totRooms=6,roomCleared=0;
let rMeshes=[],rObs=[],doorData=[],destruct=[],traps=[];
let enemies=[],items=[],grnds=[],expls=[];
let totKills=0,lobbyM=[],lobbyNPC=[];
let RF={dmgM:0,rateM:1,magM:0,vamp:0,blastImm:false,dropM:1,extraG:0,phoenix:0,dmgRed:0,phUsed:false};
let ownedR=[];

class Pool{constructor(fn){this.p=[];this.fn=fn}get(){let o=this.p.find(x=>!x.active);if(!o){o=this.fn();this.p.push(o)}o.active=true;o.mesh.visible=true;return o}rel(o){o.active=false;o.mesh.visible=false}relAll(){this.p.forEach(o=>this.rel(o))}}
const bP=new Pool(()=>{const m=new THREE.Mesh(new THREE.SphereGeometry(2.5,6,6),new THREE.MeshBasicMaterial({color:0xf1c40f}));sc.add(m);return{mesh:m,active:false,vx:0,vz:0,life:0}});
const ebP=new Pool(()=>{const m=new THREE.Mesh(new THREE.SphereGeometry(5,6,6),new THREE.MeshBasicMaterial({color:0xff4757}));sc.add(m);return{mesh:m,active:false,vx:0,vz:0,life:0,dmg:0}});
const ptP=new Pool(()=>{const m=new THREE.Mesh(new THREE.SphereGeometry(2,4,4),new THREE.MeshBasicMaterial({color:0xff0000}));sc.add(m);return{mesh:m,active:false,vx:0,vy:0,vz:0,life:0}});
let aB=[],aEB=[],aPt=[];

const P={r:18,wep:'glock',base:{maxHp:100,spd:300},
s:{hp:100,ammo:17,tAmmo:1/0,grenades:3,dead:false,reloading:false,lastFire:0,rldStart:0,invUntil:0,rolling:false,lastRoll:0,rollCD:2500,rollDur:280,rollDir:new THREE.Vector3(),onIce:false,onSand:false},
prog:{lv:0,xp:0,kills:0},upg:{aG:0,aU:0,aK:0,aS:0,aB:0,aBR:0,rld:0,hp:0}};

function stat(t){const w=W[P.wep];
if(t==='maxHp')return P.base.maxHp+P.upg.hp*20;
if(t==='atk')return w.dmg*(1+P.upg[w.uk]*.1)*(1+RF.dmgM);
if(t==='mag')return Math.floor(w.mag*(1+RF.magM));
if(t==='rate')return w.rate*RF.rateM;
if(t==='rld')return w.rld*(1-Math.min(.8,P.upg.rld*.1));return 0;}

function addO(m){m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.4})))}

function mkW(t){const g=new THREE.Group(),mD=new THREE.MeshLambertMaterial({color:0x1e272e}),mB=new THREE.MeshLambertMaterial({color:0xe67e22}),mG=new THREE.MeshLambertMaterial({color:0xb2bec3});
if(t==='glock'){let b=new THREE.Mesh(new THREE.BoxGeometry(3,4,10),mD);b.position.set(0,2,3);addO(b);let r=new THREE.Mesh(new THREE.BoxGeometry(3,5,4),mG);r.position.set(0,-2.5,-2);addO(r);g.add(b,r)}
else if(t==='uzi'){let b=new THREE.Mesh(new THREE.BoxGeometry(4,5,12),mD);addO(b);let r=new THREE.Mesh(new THREE.BoxGeometry(3,5,4),mG);r.position.set(0,-5,-2);addO(r);let m=new THREE.Mesh(new THREE.BoxGeometry(3,6,4),mD);m.position.set(0,-5.5,2);addO(m);let l=new THREE.Mesh(new THREE.BoxGeometry(2,2,6),mG);l.position.set(0,.5,9);addO(l);g.add(b,r,m,l)}
else if(t==='ak47'){let b=new THREE.Mesh(new THREE.BoxGeometry(3,5,16),mD);addO(b);let r=new THREE.Mesh(new THREE.BoxGeometry(3,5,4),mB);r.position.set(0,-5,-4);addO(r);let s=new THREE.Mesh(new THREE.BoxGeometry(3,5,10),mB);s.position.set(0,-2.5,-13);addO(s);let m=new THREE.Mesh(new THREE.BoxGeometry(3,7,5),mD);m.position.set(0,-6,4);m.rotation.x=Math.PI/8;addO(m);let l=new THREE.Mesh(new THREE.BoxGeometry(1.5,1.5,12),mG);l.position.set(0,1,14);addO(l);g.add(b,r,s,m,l)}
else if(t==='spas'){let b=new THREE.Mesh(new THREE.BoxGeometry(4,6,16),mD);addO(b);let r=new THREE.Mesh(new THREE.BoxGeometry(3,5,4),mD);r.position.set(0,-5.5,-4);addO(r);let p=new THREE.Mesh(new THREE.BoxGeometry(5,4,10),mG);p.position.set(0,-1,8);addO(p);let l=new THREE.Mesh(new THREE.BoxGeometry(2,2,10),mD);l.position.set(0,1,15);addO(l);g.add(b,r,p,l)}
return g;}

function mkH(type){const g=new THREE.Group();let sk,cl;
const cm={player:[0xffeaa7,0x0984e3],green:[0x55efc4,0x2d3436],purple:[0xa29bfe,0x2d3436],red:[0xff7675,0x2d3436],blue:[0x0097e6,0x2d3436],boss:[0xff6348,0x2d3436],bomber:[0xff9f43,0x3d3d3d],shield:[0xdfe6e9,0x636e72],necro:[0x6c5ce7,0x2d3436],ghost:[0xdfe6e9,0x74b9ff]};
[sk,cl]=cm[type]||cm.green;
const mS=new THREE.MeshLambertMaterial({color:sk}),mC=new THREE.MeshLambertMaterial({color:cl});

// --- TRAP SYSTEM ---
function getTrapCount(fl,isBoss){
if(fl<=1)return 0;if(fl===2)return 1;if(fl===3)return isBoss?2:1;if(fl===4)return 2;return isBoss?4:3;}

function placeTrap(type,cx,cz){
const hs=RS/2;
if(type==='spike'){
const m=new THREE.Mesh(new THREE.BoxGeometry(60,3,60),new THREE.MeshLambertMaterial({color:0xcc3333,transparent:true,opacity:.6}));
m.position.set(cx,1.5,cz);sc.add(m);rMeshes.push(m);
traps.push({type:'spike',mesh:m,x:cx,z:cz,w:60,d:60,timer:0,active:false,period:2});}
else if(type==='saw'){
const m=new THREE.Mesh(new THREE.CylinderGeometry(18,18,8,16),new THREE.MeshLambertMaterial({color:0xaaaaaa}));
m.position.set(cx,4,cz);sc.add(m);rMeshes.push(m);
const dir=Math.random()>.5?'x':'z';const range=150;
traps.push({type:'saw',mesh:m,ox:cx,oz:cz,dir,range,speed:200,t:Math.random()*Math.PI*2});}
else if(type==='arrow'){
const side=Math.random()>.5?-1:1;const wx=side*(hs-10);
const m=new THREE.Mesh(new THREE.BoxGeometry(15,15,15),new THREE.MeshLambertMaterial({color:0x8B4513}));
m.position.set(wx,15,cz);sc.add(m);rMeshes.push(m);
traps.push({type:'arrow',mesh:m,x:wx,z:cz,side,timer:0,interval:2.5});}
else if(type==='dynamite'){
const m=new THREE.Mesh(new THREE.BoxGeometry(20,25,20),new THREE.MeshLambertMaterial({color:0xd63031}));
m.position.set(cx,12.5,cz);addO(m);sc.add(m);rMeshes.push(m);
const obs={x:cx-10,z:cz-10,w:20,d:20,dynIdx:traps.length};rObs.push(obs);
traps.push({type:'dynamite',mesh:m,x:cx,z:cz,hp:15,obsRef:obs,alive:true});}
else if(type==='ice'){
const m=new THREE.Mesh(new THREE.BoxGeometry(80,2,80),new THREE.MeshLambertMaterial({color:0x74b9ff,transparent:true,opacity:.5}));
m.position.set(cx,1,cz);sc.add(m);rMeshes.push(m);
traps.push({type:'ice',mesh:m,x:cx-40,z:cz-40,w:80,d:80});}
else if(type==='sand'){
const m=new THREE.Mesh(new THREE.BoxGeometry(80,2,80),new THREE.MeshLambertMaterial({color:0xc8a86e,transparent:true,opacity:.5}));
m.position.set(cx,1,cz);sc.add(m);rMeshes.push(m);
traps.push({type:'sand',mesh:m,x:cx-40,z:cz-40,w:80,d:80});}
}

function spawnTraps(isBoss){
const cnt=getTrapCount(floor,isBoss);if(cnt<=0)return;
const types=['spike','saw','arrow','dynamite','ice','sand'];
const hs=RS/2;const used=[];
for(let i=0;i<cnt;i++){
const type=types[Math.floor(Math.random()*types.length)];
let tx,tz,valid=false,att=0;
while(!valid&&att<30){
tx=(Math.random()-.3)*500;tz=(Math.random()-.5)*600;
if(Math.abs(tx)<100&&Math.abs(tz)<80){att++;continue}
valid=true;
for(let u of used)if(Math.abs(tx-u.x)<100&&Math.abs(tz-u.z)<100){valid=false;break}
for(let o of rObs)if(colXZ(tx,tz,50,o)){valid=false;break}
att++;}
if(valid){placeTrap(type,tx,tz);used.push({x:tx,z:tz})}
}}

function updateTraps(dt){
const now=Date.now();
P.s.onIce=false;P.s.onSand=false;
for(let t of traps){
if(t.type==='spike'){
t.timer+=dt;const cycle=t.timer%t.period;
t.active=cycle>t.period*.6;
t.mesh.material.opacity=t.active?.9:.35;
t.mesh.position.y=t.active?4:1.5;
if(t.active&&!P.s.dead&&Math.abs(pG.position.x-t.x)<30&&Math.abs(pG.position.z-t.z)<30)takeDmg(8);}
else if(t.type==='saw'){
t.t+=dt;
if(t.dir==='x')t.mesh.position.x=t.ox+Math.sin(t.t*2)*t.range;
else t.mesh.position.z=t.oz+Math.sin(t.t*2)*t.range;
t.mesh.rotation.y+=dt*15;
if(!P.s.dead&&Math.sqrt((pG.position.x-t.mesh.position.x)**2+(pG.position.z-t.mesh.position.z)**2)<P.r+18)takeDmg(12);
for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(Math.sqrt((e.mesh.position.x-t.mesh.position.x)**2+(e.mesh.position.z-t.mesh.position.z)**2)<e.r+18){e.hp-=5;if(e.hp<=0){killEnemy(j)}}}}
else if(t.type==='arrow'){
t.timer+=dt;if(t.timer>=t.interval){t.timer=0;
let eb=ebP.get();eb.mesh.material.color.setHex(0x8B4513);eb.mesh.scale.set(.8,.8,.8);
eb.mesh.position.set(t.x,15,t.z);eb.vx=-t.side*500;eb.vz=0;eb.life=2;eb.dmg=15;aEB.push(eb);}}
else if(t.type==='dynamite'&&t.alive){/* hit detection in bullet code */}
else if(t.type==='ice'){
if(!P.s.dead&&pG.position.x>t.x&&pG.position.x<t.x+t.w&&pG.position.z>t.z&&pG.position.z<t.z+t.d)P.s.onIce=true;}
else if(t.type==='sand'){
if(!P.s.dead&&pG.position.x>t.x&&pG.position.x<t.x+t.w&&pG.position.z>t.z&&pG.position.z<t.z+t.d)P.s.onSand=true;}
}}

function explodeDynamite(trap){
if(!trap.alive)return;trap.alive=false;
spawnParts(trap.mesh.position,8,0xff6348);sc.remove(trap.mesh);trap.mesh.visible=false;
for(let j=rObs.length-1;j>=0;j--)if(rObs[j].dynIdx!==undefined&&rObs[j].dynIdx===traps.indexOf(trap))rObs.splice(j,1);
const er=120;camShake=25;
const em=new THREE.Mesh(new THREE.SphereGeometry(er,12,12),new THREE.MeshBasicMaterial({color:0xff6348,transparent:true,opacity:.7}));
em.position.copy(trap.mesh.position);sc.add(em);expls.push({mesh:em,life:.35,ml:.35});
if(!P.s.dead&&!RF.blastImm&&Math.sqrt((pG.position.x-trap.x)**2+(pG.position.z-trap.z)**2)<er+P.r)takeDmg(35);
for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(Math.sqrt((e.mesh.position.x-trap.x)**2+(e.mesh.position.z-trap.z)**2)<er+e.r){e.hp-=100;if(e.hp<=0)killEnemy(j)}}}

const di=doorData.length;doorData.push({side:sd.dir,mesh:dm,open:sd.dir==='west'});
if(sd.dir!=='west')rObs.push({x:-DW/2,z:sd.nz-WT/2,w:DW,d:WT,isDoor:1,doorIdx:di})}
else{[[-gH-segLen/2,segLen],[gH+segLen/2,segLen]].forEach(([oz,d])=>{const m=new THREE.Mesh(new THREE.BoxGeometry(WT,WH,d),mWall);m.position.set(sd.nx,WH/2,oz);m.castShadow=true;addO(m);sc.add(m);rMeshes.push(m);rObs.push({x:sd.nx-WT/2,z:oz-d/2,w:WT,d})});
const dm=new THREE.Mesh(new THREE.BoxGeometry(WT,WH,DW),sd.dir==='west'?mDoor:mDoorL);dm.position.set(sd.nx,WH/2,0);sc.add(dm);rMeshes.push(dm);

}else{

else{const m=new THREE.Mesh(new THREE.BoxGeometry(WT,WH,RS+WT*2),mWall);m.position.set(sd.nx,WH/2,0);m.castShadow=true;addO(m);sc.add(m);rMeshes.push(m);rObs.push({x:sd.nx-WT/2,z:-(RS+WT*2)/2,w:WT,d:RS+WT*2})}}});

if(tpl.covers)tpl.covers.forEach(c=>{const h=60+Math.random()*40;const m=new THREE.Mesh(new THREE.BoxGeometry(c.w,h,c.d),mCover);m.position.set(c.x,h/2,c.z);m.castShadow=true;addO(m);sc.add(m);rMeshes.push(m);rObs.push({x:c.x-c.w/2,z:c.z-c.d/2,w:c.w,d:c.d})});
if(tpl.dcov)tpl.dcov.forEach(c=>{const h=40;const m=new THREE.Mesh(new THREE.BoxGeometry(c.w,h,c.d),mDCov.clone());m.position.set(c.x,h/2,c.z);m.castShadow=true;addO(m);sc.add(m);const obs={x:c.x-c.w/2,z:c.z-c.d/2,w:c.w,d:c.d,destIdx:destruct.length};rObs.push(obs);destruct.push({mesh:m,hp:30,mhp:30,obsRef:obs,cx:c.x,cz:c.z})});

function spawnRoomEnemies(isBoss){
const hpM=1+(floor-1)*.22;const dmgM=1+(floor-1)*.18;const rm=1+roomIdx*.05;const hs=RS/2;
if(isBoss){
const m=mkH('boss');m.position.set(150,54.6,0);sc.add(m);
enemies.push({mesh:m,type:'boss',hp:450*hpM,speed:55,r:35,dmg:18*dmgM,lastAtk:0,shootInt:1500,isBoss:1,phase:1});
for(let i=0;i<2;i++){const em=mkH('purple');const a=(i/2)*Math.PI*2;em.position.set(150+Math.cos(a)*120,24.57,Math.sin(a)*120);sc.add(em);enemies.push({mesh:em,type:'purple',hp:12*hpM,speed:250,r:17,dmg:5*dmgM,lastAtk:0})}

else if(type==='blue')Object.assign(zb,{hp:220*hpM,speed:42*rm,r:35,dmg:15*dmgM,shootInt:2500});
else if(type==='bomber')Object.assign(zb,{hp:40*hpM,speed:100*rm,r:22,dmg:12*dmgM,shootInt:3000});
else if(type==='shield')Object.assign(zb,{hp:100*hpM,speed:110*rm,r:24,dmg:10*dmgM,shieldHp:50*hpM});
else if(type==='necro')Object.assign(zb,{hp:70*hpM,speed:50*rm,r:22,dmg:8*dmgM,shootInt:2500,summonCD:6000,lastSummon:0});
else if(type==='ghost')Object.assign(zb,{hp:45*hpM,speed:200*rm,r:18,dmg:12*dmgM,teleCD:3000,lastTele:0});

let sx,sz,valid=0,att=0;

const m=mkH(type);m.position.set(sx,yM[type]||27.3,sz);sc.add(m);zb.mesh=m;enemies.push(zb);

const bdc=new THREE.Vector3(0,0,1).applyQuaternion(pG.quaternion);const pl=wc.pellets||1;const sp=wc.spread||0;const bs=1200;
for(let i=0;i<pl;i++){const bd=bdc.clone();if(pl>1)bd.applyAxisAngle(new THREE.Vector3(0,1,0),-sp+sp*2*i/(pl-1));const bp=pG.position.clone().add(bdc.clone().multiplyScalar(25));bp.y=32.5;
let b=bP.get();b.mesh.scale.set(pl>1?.7:1,pl>1?.7:1,pl>1?.7:1);b.mesh.position.copy(bp);b.vx=bd.x*bs;b.vz=bd.z*bs;b.life=wc.range/bs;aB.push(b)}
camShake=wc.shake;P.s.ammo--;P.s.lastFire=now;

function updEnemies(dt){
const now=Date.now();const hs=RS/2;
for(let j=enemies.length-1;j>=0;j--){
let e=enemies[j],dx=pG.position.x-e.mesh.position.x,dz=pG.position.z-e.mesh.position.z,dist=Math.sqrt(dx*dx+dz*dz);
e.mesh.lookAt(pG.position.x,e.mesh.position.y,pG.position.z);
// Boss phase
if(e.isBoss&&e.hp<200&&e.phase===1){e.phase=2;e.shootInt=700;e.speed=90;
for(let i=0;i<3;i++){const em=mkH('green');const a=Math.random()*Math.PI*2;em.position.set(e.mesh.position.x+Math.cos(a)*80,27.3,e.mesh.position.z+Math.sin(a)*80);sc.add(em);enemies.push({mesh:em,type:'green',hp:18,speed:180,r:20,dmg:8,lastAtk:0})}}
// Ghost teleport
if(e.type==='ghost'&&now-e.lastTele>e.teleCD&&dist<400){
e.lastTele=now;const a=Math.random()*Math.PI*2;const nd=80+Math.random()*100;
let nx=pG.position.x+Math.cos(a)*nd,nz=pG.position.z+Math.sin(a)*nd;
nx=Math.max(-hs+e.r,Math.min(hs-e.r,nx));nz=Math.max(-hs+e.r,Math.min(hs-e.r,nz));
spawnParts(e.mesh.position,3,0x74b9ff);e.mesh.position.x=nx;e.mesh.position.z=nz;spawnParts(e.mesh.position,3,0x74b9ff)}
// Necro summon
if(e.type==='necro'&&e.summonCD&&now-e.lastSummon>e.summonCD&&enemies.length<20){
e.lastSummon=now;for(let i=0;i<2;i++){const em=mkH('green');const a=Math.random()*Math.PI*2;
em.position.set(e.mesh.position.x+Math.cos(a)*50,27.3,e.mesh.position.z+Math.sin(a)*50);sc.add(em);
enemies.push({mesh:em,type:'green',hp:15,speed:160,r:20,dmg:6,lastAtk:0});spawnParts(em.position,2,0x6c5ce7)}}

if(dist>e.r+P.r+2){
let dirX=dx/dist,dirZ=dz/dist;
e.mesh.position.x+=dirX*e.speed*dt;for(let o of rObs)if(colXZ(e.mesh.position.x,e.mesh.position.z,e.r,o))e.mesh.position.x-=dirX*e.speed*dt;
e.mesh.position.z+=dirZ*e.speed*dt;for(let o of rObs)if(colXZ(e.mesh.position.x,e.mesh.position.z,e.r,o))e.mesh.position.z-=dirZ*e.speed*dt;
e.mesh.position.x=Math.max(-hs+e.r,Math.min(hs-e.r,e.mesh.position.x));e.mesh.position.z=Math.max(-hs+e.r,Math.min(hs-e.r,e.mesh.position.z));
e.mesh.userData.lLG.rotation.x=Math.sin(now*.015)*.5;e.mesh.userData.rLG.rotation.x=-Math.sin(now*.015)*.5;
}else if(!P.s.dead)takeDmg(e.dmg);

// Shooting enemies
if((e.type==='red'||e.type==='blue'||e.isBoss||e.type==='bomber'||e.type==='necro')&&e.shootInt&&now-e.lastAtk>e.shootInt&&!P.s.dead){
let ba=Math.atan2(dz,dx),angles=[ba];
if(e.type==='blue')angles=[ba-.25,ba,ba+.25];
if(e.isBoss&&e.phase===2)angles=[ba-.4,ba-.2,ba,ba+.2,ba+.4];else if(e.isBoss)angles=[ba-.2,ba,ba+.2];
if(e.type==='bomber'){

eb.mesh.position.copy(e.mesh.position);eb.mesh.position.y=e.isBoss||e.type==='blue'?55:41;

e.lastAtk=now}
}}

if(t>=1){let er=100*(1+P.upg.aBR*.1);const em=new THREE.Mesh(new THREE.SphereGeometry(er,12,12),new THREE.MeshBasicMaterial({color:0xff4757,transparent:true,opacity:.8}));em.position.set(g.tx,5,g.tz);sc.add(em);expls.push({mesh:em,life:.3,ml:.3});camShake=30;
let dmg=220*(1+P.upg.aB*.1);if(!P.s.dead&&!RF.blastImm&&Math.sqrt((pG.position.x-g.tx)**2+(pG.position.z-g.tz)**2)<er+P.r)takeDmg(dmg);
destruct.forEach((d,di)=>{if(d.hp>0&&Math.sqrt((d.cx-g.tx)**2+(d.cz-g.tz)**2)<er+30)damageD(di,999)});
traps.forEach(tr=>{if(tr.type==='dynamite'&&tr.alive&&Math.sqrt((tr.x-g.tx)**2+(tr.z-g.tz)**2)<er+20)explodeDynamite(tr)});
for(let j=enemies.length-1;j>=0;j--){let e=enemies[j];if(Math.sqrt((e.mesh.position.x-g.tx)**2+(e.mesh.position.z-g.tz)**2)<=er+e.r){e.hp-=dmg;if(e.hp<=0)killEnemy(j)}}
sc.remove(g.mesh);grnds.splice(i,1)}
else{g.mesh.position.x=g.sx+(g.tx-g.sx)*t;g.mesh.position.z=g.sz+(g.tz-g.sz)*t;g.mesh.position.y=40+Math.sin(t*Math.PI)*150;g.mesh.rotation.x+=.2;g.mesh.rotation.z+=.2}}

for(let i=expls.length-1;i>=0;i--){let x=expls[i];x.life-=dt;x.mesh.material.opacity=(x.life/x.ml)*.8;const s=1+(1-x.life/x.ml)*.5;x.mesh.scale.set(s,s,s);if(x.life<=0){sc.remove(x.mesh);expls.splice(i,1)}}

for(let i=items.length-1;i>=0;i--){let it=items[i];it.mesh.rotation.y+=3*dt;
if(now-it.t>15000){sc.remove(it.mesh);items.splice(i,1);continue}
if(Math.sqrt((it.mesh.position.x-pG.position.x)**2+(it.mesh.position.z-pG.position.z)**2)<P.r+12&&!P.s.dead){
if(it.type==='health'){if(P.s.hp<stat('maxHp')){P.s.hp=Math.min(stat('maxHp'),P.s.hp+30);sc.remove(it.mesh);items.splice(i,1);continue}}
else{P.wep=it.type;P.s.ammo=stat('mag');P.s.reloading=false;if(it.type==='uzi')P.s.tAmmo=50;else if(it.type==='ak47')P.s.tAmmo=90;else if(it.type==='spas')P.s.tAmmo=24;
const og=pG.getObjectByName('gun');if(og)pG.remove(og);const ng=mkW(it.type);ng.name='gun';ng.position.set(9,4,14);pG.add(ng);sc.remove(it.mesh);items.splice(i,1);continue}}}}

function doMiniExplosion(ex,ez,dmg){
const er=70;camShake=15;
const em=new THREE.Mesh(new THREE.SphereGeometry(er,10,10),new THREE.MeshBasicMaterial({color:0xff9f43,transparent:true,opacity:.7}));
em.position.set(ex,5,ez);sc.add(em);expls.push({mesh:em,life:.25,ml:.25});
if(!P.s.dead&&Math.sqrt((pG.position.x-ex)**2+(pG.position.z-ez)**2)<er+P.r)takeDmg(dmg);
for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(Math.sqrt((e.mesh.position.x-ex)**2+(e.mesh.position.z-ez)**2)<er+e.r){e.hp-=dmg*.5;if(e.hp<=0)killEnemy(j)}}}

function updCam(dt){cam.position.x+=(pG.position.x-cam.position.x)*5*dt;cam.position.z+=(pG.position.z-cam.position.z)*5*dt;cam.position.y=600;if(camShake>0){cam.position.x+=(Math.random()-.5)*camShake;cam.position.z+=(Math.random()-.5)*camShake;camShake-=dt*60;if(camShake<0)camShake=0}}

function updMini(){const c=document.getElementById('minimap').getContext('2d');c.clearRect(0,0,140,140);if(P.s.dead||gPhase!=='dungeon')return;
const cx=70,cy=70,s=140/(RS+100);c.strokeStyle='rgba(255,255,255,.15)';c.lineWidth=1;const hs=RS/2;c.strokeRect(cx-hs*s,cy-hs*s,RS*s,RS*s);
c.fillStyle='rgba(100,100,100,.5)';for(let o of rObs)c.fillRect(cx+(o.x-pG.position.x+o.w/2-o.w/2)*s,cy+(o.z-pG.position.z+o.d/2-o.d/2)*s,o.w*s,o.d*s);
for(let e of enemies){const cm={boss:'#ff6348',blue:'#0097e6',red:'#ff7675',purple:'#a29bfe',green:'#55efc4',bomber:'#ff9f43',shield:'#dfe6e9',necro:'#6c5ce7',ghost:'#74b9ff'};
c.fillStyle=cm[e.type]||'#55efc4';c.beginPath();c.arc(cx+(e.mesh.position.x-pG.position.x)*s,cy+(e.mesh.position.z-pG.position.z)*s,e.isBoss?4:2.5,0,Math.PI*2);c.fill()}
c.fillStyle='#0984e3';c.beginPath();c.arc(cx,cy,3,0,Math.PI*2);c.fill();
const bd=new THREE.Vector3(0,0,1).applyQuaternion(pG.quaternion);c.strokeStyle='rgba(255,255,255,.7)';c.lineWidth=1.5;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+bd.x*12,cy+bd.z*12);c.stroke()}

function animate(time){requestAnimationFrame(animate);let dt=(time-lastT)/1000;if(dt>.1)dt=.1;lastT=time;
if(paused||lvlUp||relicPick){ren.render(sc,cam);return}
const now=Date.now();if(now<hitStop){ren.render(sc,cam);return}
if(gPhase==='lobby'){updLobby(dt);ren.render(sc,cam);return}
if(!P.s.dead){updMove(dt);updCombat()}
updEnemies(dt);updEntities(dt);updateTraps(dt);updCam(dt);updMini();
const hp=P.s.hp,mhp=stat('maxHp'),vg=document.getElementById('vignette');
if(hp/mhp<.3&&!P.s.dead){if(!vg.classList.contains('active'))vg.classList.add('active')}else vg.classList.remove('active');
document.getElementById('floorD').textContent=`FLOOR ${floor}`;document.getElementById('roomD').textContent=`ROOM ${roomIdx+1}/${totRooms}`;
document.getElementById('hpD').textContent=`HP: ${Math.ceil(hp)}/${mhp}`;
const wn=W[P.wep].name,ta=P.s.tAmmo===1/0?'∞':P.s.tAmmo;document.getElementById('ammoD').textContent=P.s.reloading?`[${wn}] RELOAD..`:`[${wn}] ${P.s.ammo}/${ta}`;
document.getElementById('killD').textContent=`KILLS: ${totKills}`;
const tu=Object.values(P.upg).reduce((a,b)=>a+b,0);document.getElementById('xpD').textContent=tu>=80?'LV.MAX':`LV.${P.prog.lv}(${P.prog.xp}/${Math.floor(5+P.prog.lv*.3)})`;
const rt=Math.max(0,P.s.rollCD-(now-P.s.lastRoll));document.getElementById('rollCD').style.height=(rt/P.s.rollCD*100)+'%';document.getElementById('rollUI').className=rt===0&&!P.s.dead?'si ready':'si';
document.getElementById('gCnt').textContent=P.s.grenades;document.getElementById('grenadeUI').className=P.s.grenades>0&&!P.s.dead?'si gr':'si';
ren.render(sc,cam)}

// INPUT
function tS(e,z){e.preventDefault();for(let i=0;i<e.changedTouches.length;i++){let t=e.changedTouches[i],j=joys[z];if(!j.active){j.active=1;j.id=t.identifier;j.o={x:t.clientX,y:t.clientY};j.d={x:0,y:0};j.bEl.style.left=j.o.x+'px';j.bEl.style.top=j.o.y+'px';j.bEl.style.display='block';j.kEl.style.left=j.o.x+'px';j.kEl.style.top=j.o.y+'px';j.kEl.style.display='block'}}}
function tM(e){if(lvlUp||paused||relicPick)return;e.preventDefault();for(let i=0;i<e.changedTouches.length;i++){let t=e.changedTouches[i];for(let k in joys){let j=joys[k];if(j.active&&j.id===t.identifier){let dx=t.clientX-j.o.x,dy=t.clientY-j.o.y,d=Math.sqrt(dx*dx+dy*dy);if(d>maxJD){dx=dx/d*maxJD;dy=dy/d*maxJD}j.kEl.style.left=(j.o.x+dx)+'px';j.kEl.style.top=(j.o.y+dy)+'px';j.d.x=dx/maxJD;j.d.y=dy/maxJD}}}}
function tE(e){if(lvlUp||paused||relicPick)return;e.preventDefault();for(let i=0;i<e.changedTouches.length;i++){let t=e.changedTouches[i];for(let k in joys){let j=joys[k];if(j.active&&j.id===t.identifier){j.active=0;j.id=null;j.d={x:0,y:0};j.bEl.style.display='none';j.kEl.style.display='none'}}}}
document.getElementById('leftZone').addEventListener('touchstart',e=>tS(e,'left'),{passive:false});
document.getElementById('rightZone').addEventListener('touchstart',e=>tS(e,'right'),{passive:false});
addEventListener('touchmove',tM,{passive:false});addEventListener('touchend',tE,{passive:false});addEventListener('touchcancel',tE,{passive:false});
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='p'||k==='ㅔ')paused=!paused;if(k==='t'||k==='ㅅ')toggleAuto();
if(e.code==='KeyW'||e.code==='ArrowUp'||k==='w'||k==='ㅈ')keys.w=1;if(e.code==='KeyS'||e.code==='ArrowDown'||k==='s'||k==='ㄴ')keys.s=1;
if(e.code==='KeyA'||e.code==='ArrowLeft'||k==='a'||k==='ㅁ')keys.a=1;if(e.code==='KeyD'||e.code==='ArrowRight'||k==='d'||k==='ㅇ')keys.d=1;
if((k==='r'||k==='ㄱ')&&gPhase==='dungeon'&&!P.s.reloading&&!P.s.dead&&P.s.ammo<stat('mag')&&P.s.tAmmo>0){P.s.reloading=true;P.s.rldStart=Date.now()}
if(e.code==='ShiftLeft')doRoll();if(e.code==='Space'){e.preventDefault();doGrenade()}});
addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(e.code==='KeyW'||e.code==='ArrowUp'||k==='w'||k==='ㅈ')keys.w=0;if(e.code==='KeyS'||e.code==='ArrowDown'||k==='s'||k==='ㄴ')keys.s=0;
if(e.code==='KeyA'||e.code==='ArrowLeft'||k==='a'||k==='ㅁ')keys.a=0;if(e.code==='KeyD'||e.code==='ArrowRight'||k==='d'||k==='ㅇ')keys.d=0});
addEventListener('blur',()=>{keys.w=keys.a=keys.s=keys.d=0;mouse.down=false});
addEventListener('mousemove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1});
addEventListener('mousedown',e=>{if(e.button===0)mouse.down=true});addEventListener('mouseup',e=>{if(e.button===0)mouse.down=false});
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)});

buildLobby();requestAnimationFrame(animate);
};
</script>
</body>
